<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>함모여</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --brand: #6B5CFF;
        --brand-pressed: #5A46F2;
        --brand-soft: #EDEBFF;
        --background: #F7F8FC;
        --surface: #FFFFFF;
        --surface-raised: #FFFFFF;
        --text-primary: #0F172A;
        --text-secondary: #64748B;
        --text-tertiary: #94A3B8;
        --border: #E5E8F1;
        --success: #22C55E;
        --success-soft: #EAFBF1;
        --warning: #F59E0B;
        --warning-soft: #FFF6DB;
        --danger: #EF4444;
        --danger-soft: #FFF0EF;
        --info: #3B82F6;
        --page-padding: 20px;
        --section-gap: 32px;
        --card-padding: 16px;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 18px;
        --radius-xl: 24px;
        --radius-pill: 999px;
        --touch-target: 44px;
        --bottom-cta-height: 56px;
        --mobile-cta-reserved: 160px;
        --shadow-card: 0 8px 24px rgba(28, 39, 63, 0.08);
        --shadow-floating: 0 12px 36px rgba(63, 63, 120, 0.14);
        --shadow-pressed: 0 2px 8px rgba(28, 39, 63, 0.10);
        --motion-fast: 140ms;
        --motion-base: 200ms;
        --motion-slow: 280ms;
        --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--background);
      }

      body {
        margin: 0;
        color: var(--text-primary);
        background: var(--background);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 3px solid rgba(90, 70, 242, 0.26);
        outline-offset: 2px;
      }

      .page {
        min-height: 100dvh;
        padding: 24px;
      }

      .layout {
        width: min(1080px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(360px, 390px) minmax(280px, 1fr);
        gap: 24px;
        align-items: start;
      }

      .phone {
        position: sticky;
        top: 24px;
        width: 100%;
        max-width: 390px;
        max-height: calc(100dvh - 48px);
        min-height: 740px;
        border: 1px solid var(--border);
        border-radius: 30px;
        background: var(--surface);
        box-shadow: var(--shadow-floating);
        overflow-x: hidden;
        overflow-y: auto;
      }

      .app {
        position: relative;
        min-height: 740px;
        display: flex;
        flex-direction: column;
        background: var(--background);
        overflow: hidden;
      }

      .AnimalBackground {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(247, 248, 252, 0.62) 0%, rgba(247, 248, 252, 0.88) 48%, rgba(247, 248, 252, 0.98) 100%),
          url("assets/final/backgrounds/background_sparse_pattern_example.png") center top / cover no-repeat,
          url("assets/final/hero/hero_animals_calendar_full_square.png") center bottom 28px / min(86%, 360px) no-repeat;
        opacity: 0.34;
      }

      .topbar,
      .screenRoot {
        position: relative;
        z-index: 1;
      }

      .topbar {
        min-height: 60px;
        padding: 14px var(--page-padding) 10px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
      }

      .brand {
        min-height: var(--touch-target);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brandHomeButton,
      .topbarButton {
        min-height: var(--touch-target);
        min-width: var(--touch-target);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 0;
        border-radius: var(--radius-pill);
        background: transparent;
      }

      .brandHomeButton {
        min-width: var(--touch-target);
        padding: 0 6px 0 0;
        color: var(--text-primary);
      }

      .brand strong {
        font-size: 18px;
        line-height: 26px;
        font-weight: 700;
      }

      .brandHomeButton span {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 16px;
        font-weight: 800;
      }

      .topbarActions {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        min-width: 0;
      }

      .topbarButton {
        padding: 0 12px;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        background: linear-gradient(180deg, #ffffff 0%, #f7f9ff 100%);
        box-shadow:
          0 7px 0 rgba(152, 162, 179, 0.12),
          0 14px 22px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        font-size: 12px;
        line-height: 16px;
        font-weight: 800;
      }

      .topbarButton:hover,
      .brandHomeButton:hover {
        background: var(--surface-raised);
      }


      .screenRoot {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: var(--section-gap);
        padding: var(--page-padding);
        padding-bottom: calc(var(--page-padding) + env(safe-area-inset-bottom, 0px));
        animation: screenEnter var(--motion-slow) var(--ease-standard);
      }

      .screenBody {
        display: flex;
        flex-direction: column;
        gap: var(--section-gap);
      }

      .screenBody > * {
        flex-shrink: 0;
      }

      .section {
        display: grid;
        gap: 12px;
      }

      .compactSection {
        display: grid;
        gap: 10px;
      }

      .eyebrow,
      .microLabel {
        color: var(--brand);
        font-size: 12px;
        line-height: 16px;
        font-weight: 700;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 36px;
        font-weight: 700;
      }

      h2 {
        font-size: 22px;
        line-height: 30px;
        font-weight: 700;
      }

      h3 {
        font-size: 18px;
        line-height: 26px;
        font-weight: 600;
      }

      p {
        color: var(--text-secondary);
        font-size: 16px;
        line-height: 24px;
        font-weight: 400;
      }

      .caption {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 18px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .pill,
      .ReasonChip {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        max-width: 100%;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        color: var(--text-secondary);
        background: var(--surface);
        font-size: 12px;
        line-height: 16px;
        font-weight: 700;
        white-space: normal;
      }

      .ReasonChip.success {
        border-color: transparent;
        color: #147D55;
        background: var(--success-soft);
      }

      .ReasonChip.warning {
        border-color: transparent;
        color: #8A5A12;
        background: var(--warning-soft);
      }

      .ReasonChip.danger {
        border-color: transparent;
        color: #B63B3B;
        background: var(--danger-soft);
      }

      .ReasonChip.brand {
        border-color: transparent;
        color: var(--brand);
        background: var(--brand-soft);
      }

      .surface,
      .CandidateSlotCard,
      .RecommendationHeroCard,
      .ShareCopyBox,
      .ResponseCoverage {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.92);
        box-shadow:
          0 8px 0 rgba(152, 162, 179, 0.09),
          0 18px 30px rgba(28, 39, 63, 0.10),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(14px);
      }

      .surface,
      .CandidateSlotCard,
      .ShareCopyBox,
      .ResponseCoverage {
        padding: var(--card-padding);
      }

      .RecommendationHeroCard {
        position: relative;
        display: block;
        padding: 18px;
        border-radius: var(--radius-xl);
        border-color: rgba(90, 70, 242, 0.18);
        background: var(--brand-soft);
        box-shadow: var(--shadow-floating);
        overflow: hidden;
      }

      .RecommendationHeroContent {
        position: relative;
        display: grid;
        gap: 14px;
      }

      .CandidateSlotCard {
        display: grid;
        gap: 12px;
        transition:
          transform var(--motion-base) var(--ease-standard),
          border-color var(--motion-base) var(--ease-standard),
          box-shadow var(--motion-base) var(--ease-standard);
      }

      .CandidateSlotCard[data-selected="true"] {
        border-color: rgba(90, 70, 242, 0.38);
        box-shadow: var(--shadow-floating);
      }

      .CandidateSlotCard[data-disabled="true"] {
        opacity: 0.66;
      }

      .CandidateSlotCard.compact {
        box-shadow: none;
      }

      .slotMeta {
        display: grid;
        gap: 2px;
      }

      .slotMeta strong,
      .ShareCopyBox strong {
        color: var(--text-primary);
        font-size: 16px;
        line-height: 24px;
        font-weight: 600;
      }

      .slotMeta span {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 18px;
      }

      .PreferenceSelector {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .preferenceOption {
        min-height: var(--touch-target);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
        box-shadow:
          0 5px 0 rgba(152, 162, 179, 0.10),
          0 10px 18px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        font-size: 13px;
        line-height: 18px;
        font-weight: 700;
        transition:
          transform var(--motion-fast) var(--ease-standard),
          box-shadow var(--motion-fast) var(--ease-standard),
          border-color var(--motion-fast) var(--ease-standard);
      }

      .preferenceOption[data-selected="true"] {
        box-shadow:
          0 2px 0 rgba(152, 162, 179, 0.14),
          0 6px 12px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .preferenceOption[data-status="prefer"][data-selected="true"] {
        border-color: var(--brand);
        color: var(--surface);
        background: var(--brand);
      }

      .preferenceOption[data-status="available"][data-selected="true"] {
        border-color: #BCEBD7;
        color: #147D55;
        background: var(--success-soft);
      }

      .preferenceOption[data-status="adjustable"][data-selected="true"] {
        border-color: #F7D58A;
        color: #8A5A12;
        background: var(--warning-soft);
      }

      .preferenceOption[data-status="hardNo"][data-selected="true"] {
        border-color: #F6C2C2;
        color: #B63B3B;
        background: var(--danger-soft);
      }

      .StateGraphic {
        min-height: 156px;
        display: grid;
        place-items: center;
        isolation: isolate;
      }

      .StateGraphicImage {
        display: block;
        width: min(180px, 62vw);
        max-height: 190px;
        object-fit: contain;
        filter: drop-shadow(0 18px 34px rgba(91, 70, 242, 0.12));
      }

      .ParticipantAvatarStack {
        display: flex;
        align-items: center;
        min-height: var(--touch-target);
      }

      .avatarToken {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        margin-left: -6px;
        border: 2px solid var(--surface);
        border-radius: 50%;
        color: var(--brand);
        background: var(--brand-soft);
        font-size: 11px;
        line-height: 1;
        font-weight: 800;
      }

      .avatarToken:first-child {
        margin-left: 0;
      }

      .avatarToken.success {
        color: #147D55;
        background: var(--success-soft);
      }

      .avatarToken.warning {
        color: #8A5A12;
        background: var(--warning-soft);
      }

      .metricGrid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 68px;
        display: grid;
        align-content: center;
        gap: 2px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface-raised);
      }

      .metric b {
        color: var(--text-primary);
        font-size: 20px;
        line-height: 26px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .metric span {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 16px;
        font-weight: 600;
      }

      .coverageTrack {
        height: 8px;
        border-radius: var(--radius-pill);
        background: var(--border);
        overflow: hidden;
      }

      .coverageFill {
        height: 100%;
        border-radius: inherit;
        background: var(--brand);
      }

      .ShareCopyBox {
        display: grid;
        gap: 10px;
      }

      .copyText {
        color: var(--text-primary);
        font-size: 16px;
        line-height: 24px;
      }

      .settingsList {
        display: grid;
        gap: 10px;
      }

      .settingsItem {
        display: grid;
        gap: 4px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface);
      }

      .settingsItem strong {
        color: var(--text-primary);
        font-size: 15px;
        line-height: 22px;
      }

      .settingsItem span {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 18px;
      }

      .StickyBottomCTA {
        position: sticky;
        bottom: 12px;
        display: grid;
        gap: 8px;
        margin-top: auto;
        padding-top: 12px;
        padding-bottom: 12px;
        background: linear-gradient(
          rgba(245, 247, 251, 0),
          var(--background) 18px,
          var(--background)
        );
      }

      .buttonRow {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .buttonRow.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .primaryButton,
      .secondaryButton,
      .quietButton {
        min-height: var(--bottom-cta-height);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 0 14px;
        border-radius: var(--radius-lg);
        font-size: 16px;
        line-height: 24px;
        font-weight: 800;
        transition:
          transform var(--motion-fast) var(--ease-standard),
          box-shadow var(--motion-fast) var(--ease-standard),
          background var(--motion-base) var(--ease-standard);
      }

      .primaryButton {
        border: 0;
        color: var(--surface);
        background: linear-gradient(180deg, #7C70FF 0%, var(--brand) 54%, var(--brand-pressed) 100%);
        box-shadow:
          0 9px 0 #4433C9,
          0 18px 32px rgba(90, 70, 242, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
      }

      .primaryButton:active,
      .secondaryButton:active,
      .quietButton:active,
      .preferenceOption:active,
      .candidateActionButton:active {
        transform: translateY(3px);
        box-shadow:
          0 2px 0 rgba(28, 39, 63, 0.16),
          0 7px 14px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .primaryButton:hover {
        background: linear-gradient(180deg, #8478FF 0%, var(--brand) 54%, var(--brand-pressed) 100%);
      }

      .secondaryButton {
        border: 1px solid transparent;
        color: var(--brand);
        background: linear-gradient(180deg, #ffffff 0%, var(--brand-soft) 100%);
        box-shadow:
          0 8px 0 rgba(90, 70, 242, 0.14),
          0 14px 24px rgba(90, 70, 242, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
      }

      .quietButton {
        border: 1px solid var(--border);
        color: var(--text-primary);
        background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
        box-shadow:
          0 8px 0 rgba(152, 162, 179, 0.12),
          0 14px 24px rgba(28, 39, 63, 0.10),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
      }

      .fieldList {
        display: grid;
        gap: 10px;
      }

      .fieldRow {
        min-height: var(--touch-target);
        display: grid;
        gap: 4px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface);
      }

      .fieldRow span {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 16px;
        font-weight: 600;
      }

      .fieldRow strong {
        color: var(--text-primary);
        font-size: 16px;
        line-height: 24px;
      }

      .guideNote {
        padding: 12px 14px;
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        background: var(--surface-raised);
        font-size: 13px;
        line-height: 18px;
      }

      .formStack {
        display: grid;
        gap: 14px;
      }

      .inputGroup {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .inputLabel {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 18px;
        font-weight: 700;
      }

      .textInput {
        min-height: var(--touch-target);
        min-width: 0;
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        background: var(--surface);
      }

      .textInput::placeholder {
        color: var(--text-tertiary);
      }

      .formGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .IOSCountSelect {
        appearance: none;
        -webkit-appearance: none;
      }

      .selectShell {
        position: relative;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(249, 251, 255, 0.96) 100%),
          var(--surface);
        box-shadow:
          inset 0 -1px 0 rgba(17, 24, 39, 0.04),
          0 1px 0 rgba(255, 255, 255, 0.9);
        overflow: hidden;
      }

      .selectShell:focus-within {
        border-color: rgba(90, 70, 242, 0.58);
        box-shadow: 0 0 0 4px rgba(90, 70, 242, 0.1);
      }

      .selectShell::after {
        content: "⌄";
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-56%);
        color: var(--text-tertiary);
        pointer-events: none;
        font-size: 16px;
        line-height: 1;
      }

      .IOSCountSelect {
        min-height: var(--touch-target);
        width: 100%;
        min-width: 0;
        padding: 10px 36px 10px 12px;
        border: 0;
        color: var(--text-primary);
        background: transparent;
      }

      .candidateInputCard {
        display: grid;
        gap: 10px;
        padding: var(--card-padding);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.94);
        box-shadow:
          0 8px 0 rgba(152, 162, 179, 0.08),
          0 16px 26px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
      }

      .ReleaseDateControl,
      .ReleaseTimeControl {
        display: grid;
        gap: 8px;
      }

      .ReleaseDateChipGroup,
      .ReleaseTimeSlotGroup {
        display: grid;
        gap: 8px;
      }

      .ReleaseDateChipGroup {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .ReleaseTimeSegment {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        padding: 4px;
        border-radius: var(--radius-pill);
        background: var(--brand-soft);
      }

      .ReleaseTimeSegment span {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-pill);
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 18px;
        font-weight: 800;
      }

      .ReleaseTimeSegment span[data-active="true"] {
        color: var(--surface);
        background: var(--brand);
        box-shadow: 0 8px 18px rgba(91, 70, 242, 0.24);
      }

      .ReleaseTimeSlotGroup {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .ReleaseDateChip,
      .ReleaseTimeSlot {
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(249, 251, 255, 0.98) 100%);
        box-shadow: inset 0 -1px 0 rgba(17, 24, 39, 0.04);
        font-size: 13px;
        line-height: 18px;
        font-weight: 800;
        transition:
          transform var(--motion-fast) var(--ease-standard),
          border-color var(--motion-fast) var(--ease-standard),
          background var(--motion-fast) var(--ease-standard),
          box-shadow var(--motion-fast) var(--ease-standard);
      }

      .ReleaseDateChip {
        display: grid;
        align-content: center;
        gap: 2px;
        padding: 8px 6px;
      }

      .ReleaseDateChip small {
        color: var(--text-secondary);
        font-size: 11px;
        line-height: 14px;
        font-weight: 700;
      }

      .ReleaseDateChip[data-selected="true"],

          "futureDeletionTitle": "계정 삭제는 아직 없음",
          "futureDeletionBody": "현재는 계정이 없어서 서버 계정 삭제 대상도 없어요. Toss login이나 Supabase를 연결하면 로컬 삭제와 계정/서버 데이터 삭제 요청을 분리해 제공해야 해요.",
          "serverDeletionLink": "계정/서버 데이터 삭제 요청",
          "unsavedExitConfirm": "작성 중인 내용이 있어요. 홈으로 이동하면 현재 입력을 잃을 수 있습니다. 이동할까요?"

    </script>
    <script>
      const locales = {
        ko: JSON.parse(document.getElementById("locale-ko").textContent),
      };
      const screenRoot = document.getElementById("screen-root");
      const tabsRoot = document.getElementById("screen-tabs");
      const appRoot = document.querySelector(".app");
      const STORAGE_KEY = "hammoyo:release:v1";
      const DEMO_STORAGE_KEY = "hammoyo:release:demo:v1";
      const APP_VERSION = 1;
      let activeLocale = "ko";
      let locale = locales.ko;
      let hasUnsavedEdits = false;
      let renderedScreen = "scr-00-entry";
      const screenOrder = [
        "scr-00-entry",
        "scr-01-host-room",
        "scr-02-participant-input",
        "scr-02b-response-complete",
        "scr-03-result-recommendation",
        "scr-04-insufficient-response",
        "scr-05-link-expired",
        "scr-06-room-closed",
        "scr-07-settings",
        "scr-08-my-meetups",
      ];

      const demoFixtures = {
        ko: {
          title: "대학 동기 모임",
          deadlineLabel: "6.28 금요일 22:00",
          candidates: [
            { id: "slot-1", label: "6.29 토요일", time: "18:30", note: "강남역 근처" },
            { id: "slot-2", label: "6.30 일요일", time: "17:00", note: "잠실" },
            { id: "slot-3", label: "7.1 월요일", time: "19:00", note: "홍대" },
          ],
        },
        en: {
          title: "College friends meetup",
          deadlineLabel: "Fri Jun 28, 22:00",
          candidates: [
            { id: "slot-1", label: "Sat Jun 29", time: "18:30", note: "Near Gangnam Station" },
            { id: "slot-2", label: "Sun Jun 30", time: "17:00", note: "Jamsil" },
            { id: "slot-3", label: "Mon Jul 1", time: "19:00", note: "Hongdae" },
          ],
        },
      };

      const defaultCandidates = demoFixtures.ko.candidates;
      const MAX_CANDIDATES = 8;
      const releaseDateValues = [
        "2026-07-05",
        "2026-07-06",
        "2026-07-07",
        "2026-07-12",
        "2026-07-13",
        "2026-07-14",
      ];
      const releaseTimeValues = ["17:00", "18:30", "19:00", "19:30", "20:10", "21:00"];

      function localizedDemoFixture() {
        return demoFixtures[activeLocale] || demoFixtures.ko;
      }

      function localizedDefaultCandidates() {
        return localizedDemoFixture().candidates;
      }

      const statusMeta = {
        prefer: { icon: "★", className: "brand", score: 3 },
        available: { icon: "✓", className: "success", score: 2 },
        adjustable: { icon: "≋", className: "warning", score: 1 },
        hardNo: { icon: "−", className: "danger", score: 0 },
      };

      const escapeHtml = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      function formatTemplate(template, values = {}) {
        return String(template || "").replace(/\{(\w+)\}/g, (_, key) => String(values[key] ?? ""));
      }

      function toBase64Url(value) {
        const bytes = new TextEncoder().encode(JSON.stringify(value));
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }

      function fromBase64Url(value) {
        try {
          const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
          const binary = atob(padded);
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          return JSON.parse(new TextDecoder().decode(bytes));
        } catch {
          return null;
        }
      }

      function weekdayLabel(dateValue) {
        if (!dateValue) return "";
        const date = new Date(`${dateValue}T00:00:00`);
        if (Number.isNaN(date.getTime())) return "";
        const weekdays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
        return `${date.getMonth() + 1}.${date.getDate()} ${weekdays[date.getDay()]}`;
      }

      function releaseDateOptions(selectedDate, index) {
        const rotated = [
          ...releaseDateValues.slice(index % releaseDateValues.length),
          ...releaseDateValues.slice(0, index % releaseDateValues.length),
        ];
        const values = [selectedDate, ...rotated].filter(Boolean);
        return [...new Set(values)].slice(0, 6);
      }

      function releaseTimePeriod(timeValue) {
        const hour = Number.parseInt(String(timeValue || "18:00").split(":")[0], 10);
        if (hour < 17) return "낮";
        if (hour < 20) return "저녁";
        return "밤";
      }

      function renderReleaseDateControl(candidate, index) {
        const selectedDate = candidate.date || releaseDateValues[index % releaseDateValues.length];
        const options = releaseDateOptions(selectedDate, index);
        return `
          <div class="ReleaseDateControl" data-testid="candidate-date-control-${index}">
            <input type="hidden" name="candidate-date-${index}" value="${escapeHtml(selectedDate)}" />
            <div class="ReleaseDateChipGroup" role="radiogroup" aria-label="후보 ${index + 1} 날짜">
              ${options
                .map((dateValue) => {
                  const selected = dateValue === selectedDate;
                  const label = weekdayLabel(dateValue) || dateValue;
                  const [monthDay, weekday = ""] = label.split(" ");
                  return `<button class="ReleaseDateChip" type="button" role="radio" aria-checked="${selected}" data-selected="${selected}" data-action="set-candidate-date" data-candidate-index="${index}" data-value="${escapeHtml(dateValue)}" data-testid="candidate-date-chip-${index}-${escapeHtml(dateValue)}">
                    <span>${escapeHtml(monthDay)}</span><small>${escapeHtml(weekday)}</small>
                  </button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }

      function renderReleaseTimeControl(candidate, index) {
        const selectedTime = candidate.time || releaseTimeValues[index % releaseTimeValues.length];
        const activePeriod = releaseTimePeriod(selectedTime);
        return `
          <div class="ReleaseTimeControl" data-testid="candidate-time-control-${index}">
            <input type="hidden" name="candidate-time-${index}" value="${escapeHtml(selectedTime)}" />
            <div class="ReleaseTimeSegment" aria-label="시간대">
              ${["낮", "저녁", "밤"]
                .map((period) => `<span data-active="${period === activePeriod}">${period}</span>`)
                .join("")}
            </div>
            <div class="ReleaseTimeSlotGroup" role="radiogroup" aria-label="후보 ${index + 1} 시간">
              ${releaseTimeValues
                .map((timeValue) => {
                  const selected = timeValue === selectedTime;
                  return `<button class="ReleaseTimeSlot" type="button" role="radio" aria-checked="${selected}" data-selected="${selected}" data-action="set-candidate-time" data-candidate-index="${index}" data-value="${escapeHtml(timeValue)}" data-testid="candidate-time-slot-${index}-${escapeHtml(timeValue)}">${escapeHtml(timeValue)}</button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }

      function createShareSnapshot(room) {
        return {
          v: 1,
          id: room.id,
          inviteSlug: room.inviteSlug || room.id,
          title: room.title,
          expectedCount: room.expectedCount,
          deadlineLabel: room.deadlineLabel,
          candidates: room.candidates.map((candidate) => ({
            id: candidate.id,
            date: candidate.date || "",
            label: candidate.label,
            time: candidate.time,
            starts_at: candidate.starts_at || "",
            note: candidate.note,
          })),
        };
      }

      function buildGeneralShareUrl(room) {
        const url = new URL(window.location.href);
        url.search = "";
        url.hash = "";
        url.searchParams.set("screen", "scr-00-entry");
        url.searchParams.set("join", toBase64Url(createShareSnapshot(room)));
        return url.toString();
      }

      function publicRoomFromShareSnapshot(snapshot) {
        if (!snapshot || snapshot.v !== 1 || !Array.isArray(snapshot.candidates)) return null;
        return createDemoRoom({
          id: snapshot.id || `shared-${Date.now().toString(36)}`,
          inviteSlug: snapshot.inviteSlug || snapshot.id || "",
          title: snapshot.title || localizedDemoFixture().title,
          expectedCount: snapshot.expectedCount || 4,
          deadlineLabel: snapshot.deadlineLabel || localizedDemoFixture().deadlineLabel,
          candidates: snapshot.candidates.slice(0, MAX_CANDIDATES),
          responses: [],
          status: "collecting",
          isSharedLink: true,
        });
      }

      function currentStorageKey() {
        return isDemoMode() ? DEMO_STORAGE_KEY : STORAGE_KEY;
      }

      function getInitialLocale() {
        return "ko";
      }

      function applyLocale(nextLocale) {
        activeLocale = "ko";
        locale = locales[activeLocale];
        document.documentElement.lang = activeLocale;
        const phoneFrame = document.querySelector(".phone");
        const homeButton = document.querySelector('[data-testid="topbar-home-button"]');
        const privacyButton = document.querySelector('[data-testid="settings-button"]');
        const homeLabel = document.querySelector(".brandHomeButton span");
        if (phoneFrame) phoneFrame.setAttribute("aria-label", locale.ui.phoneLabel);
        if (homeButton) homeButton.setAttribute("aria-label", locale.ui.homeButtonLabel);
        if (privacyButton) privacyButton.textContent = locale.ui.privacyButton;
        if (privacyButton) privacyButton.setAttribute("aria-label", locale.ui.privacyButtonLabel);
        if (homeLabel) homeLabel.textContent = locale.ui.homeShort;
      }

      const screenCopy = (id) => locale.screens[id];

      const isAiEnabled = () => {
        return document.body.dataset.aiCopyEnabled === "true";
      };

      const isDemoMode = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get("demo") === "1";
      };

      const isDebugMode = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get("debug") === "1";
      };

      function applyDebugMode() {
        document.body.dataset.debugPanels = isDebugMode() ? "true" : "false";
      }

      const isTerminalRoom = (room) => room.status === "closed" || room.status === "expired";
      const isRoomRevoked = (room) => Boolean(room?.id && (appState?.revokedRoomIds || []).includes(room.id));

      function normalizeStatus(status) {
        return Object.prototype.hasOwnProperty.call(statusMeta, status) ? status : "available";
      }

      function clampNumber(value, min, max, fallback) {
        const next = Number.parseInt(value, 10);
        if (!Number.isFinite(next)) return fallback;
        return Math.min(max, Math.max(min, next));
      }

      function minimumResponses(expectedCount) {
        const safeExpected = Number.isFinite(Number(expectedCount)) ? Number(expectedCount) : 4;
        return Math.max(3, Math.ceil(safeExpected * 0.6));
      }

      function normalizeCandidate(candidate, index) {
        const fallback = localizedDefaultCandidates()[index] || localizedDefaultCandidates()[0];
        const date = String(candidate?.date || "").trim();
        const time = String(candidate?.time || fallback.time).trim();
        const explicitStartsAt = String(candidate?.starts_at || candidate?.startsAt || "").trim();
        const label = String(candidate?.label || weekdayLabel(date) || fallback.label).trim();
        return {
          id: candidate?.id || `slot-${index + 1}`,
          date,
          label,
          time,
          starts_at: explicitStartsAt || (date && time ? `${date}T${time}` : ""),
          note: String(candidate?.note || fallback.note).trim(),
        };
      }

      function normalizeResponse(response, index) {
        const preferences = {};
        Object.entries(response?.preferences || {}).forEach(([candidateId, status]) => {
          preferences[candidateId] = normalizeStatus(status);
        });
        return {
          id: response?.id || `response-${index + 1}`,
          alias: String(response?.alias || `참여자 ${index + 1}`).trim(),
          preferences,
          updatedAt: response?.updatedAt || new Date().toISOString(),
        };
      }

      function createDemoRoom(options = {}) {
        const fixture = localizedDemoFixture();
        const candidates = (options.candidates || fixture.candidates)
          .slice(0, MAX_CANDIDATES)
          .map((candidate, index) => normalizeCandidate(candidate, index));
        const room = {
          id: options.id || `room-${Date.now().toString(36)}`,
          title: String(options.title || fixture.title).trim(),
          expectedCount: clampNumber(options.expectedCount, 3, 20, 7),
          deadlineLabel: String(options.deadlineLabel || fixture.deadlineLabel).trim(),
          candidates,
          responses: (options.responses || []).map(normalizeResponse),
          status: options.status || "collecting",
          selectedCandidateId: options.selectedCandidateId || null,
          shareUrl: options.shareUrl || "",
          inviteSlug: options.inviteSlug || options.id || "",
          isSharedLink: Boolean(options.isSharedLink),
          createdAt: options.createdAt || new Date().toISOString(),
          closedAt: options.closedAt || null,
        };
        if (!room.shareUrl && !room.isSharedLink) room.shareUrl = buildGeneralShareUrl(room);
        return refreshRoomStatus(room);
      }

      function getDraftPreferences(room) {
        const draft = { ...(appState?.draftPreferences || {}) };
        room.candidates.forEach((candidate) => {
          if (!draft[candidate.id]) draft[candidate.id] = "available";
        });
        return draft;
      }

      function summarizeCandidate(room, candidate, order) {
        const counts = { prefer: 0, available: 0, adjustable: 0, hardNo: 0 };
        room.responses.forEach((response) => {
          const status = normalizeStatus(response.preferences[candidate.id]);
          counts[status] += 1;
        });
        const answered = Object.values(counts).reduce((sum, value) => sum + value, 0);
        const score =
          counts.prefer * statusMeta.prefer.score +
          counts.available * statusMeta.available.score +
          counts.adjustable * statusMeta.adjustable.score +
          counts.hardNo * statusMeta.hardNo.score;
        const hardNoRatio = answered > 0 ? counts.hardNo / answered : 0;
        const excluded = counts.hardNo > 0;
        return {
          candidate,
          order,
          counts,
          answered,
          score,
          hardNoCount: counts.hardNo,
          hardNoRatio,
          preferCount: counts.prefer,
          positiveCount: counts.prefer + counts.available,
          excluded,
        };
      }

      function rankCandidates(room) {
        const responseCount = room.responses.length;
        const threshold = minimumResponses(room.expectedCount);
        const enough = responseCount >= threshold;
        const items = room.candidates
          .map((candidate, index) => summarizeCandidate(room, candidate, index))
          .sort((a, b) => {
            if (a.excluded !== b.excluded) return Number(a.excluded) - Number(b.excluded);
            if (a.score !== b.score) return b.score - a.score;
            if (a.preferCount !== b.preferCount) return b.preferCount - a.preferCount;
            if (a.positiveCount !== b.positiveCount) return b.positiveCount - a.positiveCount;
            if (a.counts.adjustable !== b.counts.adjustable) return a.counts.adjustable - b.counts.adjustable;
            if (a.candidate.starts_at !== b.candidate.starts_at) return String(a.candidate.starts_at || "").localeCompare(String(b.candidate.starts_at || ""));
            return a.order - b.order;
          });
        const eligible = items.filter((item) => !item.excluded);
        const top = enough ? eligible[0] || null : null;
        const second = top ? eligible.find((item) => item.candidate.id !== top.candidate.id) : null;
        const scoreGap = top && second ? top.score - second.score : top ? Math.max(0, top.score) : 0;
        let confidence = "none";
        if (top) {
          const responseRate = room.expectedCount > 0 ? responseCount / room.expectedCount : 0;
          if (responseRate >= 0.8 && top.hardNoCount === 0 && scoreGap >= 3) confidence = "high";
          else if (responseRate >= 0.6) confidence = "medium";
          else confidence = "low";
        }
        const confidenceLabel = {
          high: locale.ui.confidenceHigh,
          medium: locale.ui.confidenceMedium,
          low: locale.ui.confidenceLow,
          none: locale.ui.confidenceNone,
        }[confidence];
        return {
          responseCount,
          minimum: threshold,
          enough,
          items,
          top,
          alternatives: eligible.filter((item) => item.candidate.id !== top?.candidate.id).slice(0, 2),
          confidence,
          confidenceLabel,
          scoreGap,
        };
      }

      function refreshRoomStatus(room) {
        if (room.status === "draft" || room.status === "closed" || room.status === "expired") return room;
        const ranked = rankCandidates(room);
        if (ranked.top) room.status = "recommended";
        else if (ranked.enough) room.status = "needs_new_options";
        else if (room.responses.length > 0) room.status = "low_confidence";
        else room.status = "collecting";
        return room;
      }

      function buildInviteText(room) {
        const shareUrl = room.shareUrl || buildGeneralShareUrl(room);
        return formatTemplate(locale.ui.inviteText, {
          title: room.title,
          url: shareUrl,
        });
      }

      function buildRecommendationText(room, ranked = rankCandidates(room)) {
        if (!ranked.top) {
          if (ranked.enough) {
            return formatTemplate(locale.ui.recommendationBlocked, { title: room.title });
          }
          const need = Math.max(0, ranked.minimum - ranked.responseCount);
          return formatTemplate(locale.ui.recommendationWait, { need, title: room.title });
        }
        const top = ranked.top;
        const candidate = top.candidate;
        return formatTemplate(locale.ui.recommendationText, {
          title: room.title,
          label: candidate.label,
          time: candidate.time,
          reason: recommendationReason(room, ranked),
          responses: ranked.responseCount,
          prefer: top.counts.prefer,
        });
      }

      function recommendationReason(room, ranked = rankCandidates(room)) {
        if (!ranked.top) return buildRecommendationText(room, ranked);
        const top = ranked.top;
        if (top.counts.hardNo === 0 && top.counts.adjustable === 0) return locale.ui.reasonConsensus;
        if (top.counts.hardNo === 0) return locale.ui.reasonAdjustment;
        return locale.ui.reasonFallback;
      }

      function buildReminderText(room, ranked = rankCandidates(room)) {
        const need = Math.max(0, ranked.minimum - ranked.responseCount);
        if (need === 0) {
          return formatTemplate(locale.ui.reminderReadyText, { title: room.title });
        }
        return formatTemplate(locale.ui.reminderText, {
          title: room.title,
          need,
          deadline: room.deadlineLabel,
        });
      }

      function buildConfirmedText(room, ranked = rankCandidates(room)) {
        const selected =
          room.candidates.find((candidate) => candidate.id === room.selectedCandidateId) ||
          ranked.top?.candidate ||
          room.candidates[0];
        return formatTemplate(locale.ui.confirmedText, {
          title: room.title,
          label: selected.label,
          time: selected.time,
          note: selected.note,
        });
      }

      function buildCopyTextForAction(room, action, ranked = rankCandidates(room)) {
        if (action === "copy-invite") return buildInviteText(room);
        if (action === "copy-reminder") return buildReminderText(room, ranked);
        if (room.status === "closed") return buildConfirmedText(room, ranked);
        return buildRecommendationText(room, ranked);
      }

      function buildShareText(room, ranked = rankCandidates(room)) {
        return buildRecommendationText(room, ranked);
      }

      function sampleResponsesFor(room) {
        const [first, second, third] = room.candidates;
        return [
          {
            alias: "서연",
            preferences: { [first.id]: "available", [second.id]: "prefer", [third.id]: "hardNo" },
          },
          {
            alias: "지훈",
            preferences: { [first.id]: "prefer", [second.id]: "adjustable", [third.id]: "hardNo" },
          },
          {
            alias: "하린",
            preferences: { [first.id]: "available", [second.id]: "adjustable", [third.id]: "available" },
          },
          {
            alias: "도윤",
            preferences: { [first.id]: "prefer", [second.id]: "available", [third.id]: "available" },
          },
          {
            alias: "민재",
            preferences: { [first.id]: "available", [second.id]: "prefer", [third.id]: "available" },
          },
        ].map(normalizeResponse);
      }

      function createDefaultState() {
        return createFreshState();
      }

      function createDemoState() {
        const fixture = localizedDemoFixture();
        const room = createDemoRoom({
          candidates: fixture.candidates,
          responses: sampleResponsesFor({ candidates: fixture.candidates }).slice(0, 5),
        });
        return {
          version: APP_VERSION,
          room,
          hostRooms: [room],
          hostDraft: null,
          editingRoomId: null,
          inviteContext: null,
          revokedRoomIds: [],
          draftPreferences: {},
          currentParticipant: "",
          copyStatus: "",
          lastSubmittedAt: null,
          lastResponseId: null,
        };
      }

      function createFreshState() {
        return {
          version: APP_VERSION,
          room: null,
          hostRooms: [],
          hostDraft: null,
          editingRoomId: null,
          inviteContext: null,
          revokedRoomIds: [],
          draftPreferences: {},
          currentParticipant: "",
          copyStatus: "",
          lastSubmittedAt: null,
          lastResponseId: null,
        };
      }

      function createDraftRoom() {
        return createDemoRoom({
          id: `draft-${Date.now().toString(36)}`,
          responses: [],
          candidates: localizedDefaultCandidates().slice(0, 3),
          status: "draft",
        });
      }

      function hasSavedRoom() {
        return Boolean(appState.room);
      }

      function roomOrDraft() {
        if (appState.hostDraft) return createDemoRoom(appState.hostDraft);
        return appState.room || createDraftRoom();
      }

      function normalizeState(raw) {
        if (!raw || raw.version !== APP_VERSION) return createDefaultState();
        const room = raw.room ? createDemoRoom(raw.room) : null;
        if (room) {
          room.status = raw.room.status || room.status;
          room.selectedCandidateId = raw.room.selectedCandidateId || room.selectedCandidateId;
          room.closedAt = raw.room.closedAt || room.closedAt;
        }
        const hostRooms = Array.isArray(raw.hostRooms)
          ? raw.hostRooms.map((savedRoom) => createDemoRoom(savedRoom))
          : room && !room.isSharedLink
            ? [room]
            : [];
        return {
          version: APP_VERSION,
          room,
          hostRooms,
          hostDraft: raw.hostDraft ? createDemoRoom(raw.hostDraft) : null,
          editingRoomId: raw.editingRoomId || null,
          inviteContext: raw.inviteContext || null,
          revokedRoomIds: Array.isArray(raw.revokedRoomIds) ? raw.revokedRoomIds : [],
          draftPreferences: raw.draftPreferences || {},
          currentParticipant: raw.currentParticipant || "",
          copyStatus: raw.copyStatus || "",
          lastSubmittedAt: raw.lastSubmittedAt || null,
          lastResponseId: raw.lastResponseId || null,
        };
      }

      function loadState() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("reset") === "1") localStorage.removeItem(currentStorageKey());
        let storedState = null;
        try {
          const stored = localStorage.getItem(currentStorageKey());
          if (stored) storedState = normalizeState(JSON.parse(stored));
        } catch {
          storedState = null;
        }
        const shareSnapshot = fromBase64Url(params.get("join"));
        const sharedRoom = publicRoomFromShareSnapshot(shareSnapshot);
        const revokedRoomIds = storedState?.revokedRoomIds || [];
        if (shareSnapshot?.id && revokedRoomIds.includes(shareSnapshot.id)) {
          const expiredRoom = sharedRoom || createDemoRoom({ id: shareSnapshot.id, status: "expired", isSharedLink: true });
          expiredRoom.status = "expired";
          return {
            ...createFreshState(),
            room: expiredRoom,
            inviteContext: { status: "deleted", roomId: shareSnapshot.id },
            revokedRoomIds,
          };
        }
        if (sharedRoom) {
          return {
            ...createFreshState(),
            room: sharedRoom,
            inviteContext: { status: "valid", roomId: sharedRoom.id },
            revokedRoomIds,
            draftPreferences: {},
          };
        }
        if (storedState) return storedState;
        return isDemoMode() ? createDemoState() : createDefaultState();
      }

      function saveState() {
        localStorage.setItem(currentStorageKey(), JSON.stringify(appState));
      }

      activeLocale = getInitialLocale();
      applyLocale(activeLocale);

      let appState = loadState();

      function applyRouteState(screen) {
        let changed = false;
        if (appState.inviteContext?.status === "deleted") return "scr-05-link-expired";
        const roomRequiredScreens = [
          "scr-02-participant-input",
          "scr-03-result-recommendation",
          "scr-04-insufficient-response",
          "scr-06-room-closed",
        ];
        if (!appState.room && roomRequiredScreens.includes(screen)) return "scr-00-entry";
        if (screen === "scr-05-link-expired" && appState.room && isDemoMode() && appState.room.status !== "expired") {
          appState.room.status = "expired";
          changed = true;
        }
        if (screen === "scr-02b-response-complete" && !isDemoMode() && !appState.lastSubmittedAt) {
          return appState.room ? "scr-02-participant-input" : "scr-00-entry";
        }
        if (screen === "scr-06-room-closed" && appState.room.status !== "closed") {
          if (!isDemoMode()) {
            return appState.room.status === "recommended" ? "scr-03-result-recommendation" : "scr-00-entry";
          }
          const ranked = rankCandidates(appState.room);
          appState.room.selectedCandidateId = appState.room.selectedCandidateId || ranked.top?.candidate.id || appState.room.candidates[0].id;
          appState.room.status = "closed";
          appState.room.closedAt = appState.room.closedAt || new Date().toISOString();
          changed = true;
        }
        if (changed) saveState();
        return screen;
      }

      function clearLocalData() {
        localStorage.removeItem(currentStorageKey());
        appState = createFreshState();
        appState.copyStatus = "";
        hasUnsavedEdits = false;
        selectScreen("scr-00-entry");
      }

      function shouldConfirmNavigation(action) {
        if (!hasUnsavedEdits) return false;
        if (!["go-home", "open-settings", "open-existing-room", "open-host-dashboard", "start-create-room", "respond-to-invite", "history"].includes(action)) return false;
        return ["scr-01-host-room", "scr-02-participant-input"].includes(renderedScreen);
      }

      function confirmNavigationIfDirty(action) {
        if (!shouldConfirmNavigation(action)) return true;
        const ok = window.confirm(locale.ui.unsavedExitConfirm);
        if (ok) hasUnsavedEdits = false;
        return ok;
      }

      function nextAnonymousAlias(room, editingResponseId = null) {
        const base = locale.ui.anonymousAlias;
        const existingAliases = new Set(
          room.responses
            .filter((response) => response.id !== editingResponseId)
            .map((response) => response.alias),
        );
        if (!existingAliases.has(base)) return base;
        let suffix = 2;
        while (existingAliases.has(`${base} ${suffix}`)) suffix += 1;
        return `${base} ${suffix}`;
      }

      function reasonChip(kind, label) {
        const mark = kind === "success" ? "✓" : kind === "warning" ? "!" : kind === "danger" ? "−" : "•";
        return `<span class="ReasonChip ${kind}"><span aria-hidden="true">${mark}</span>${escapeHtml(label)}</span>`;
      }

      function stateGraphic(variant, label) {
        const graphicMap = {
          closed: "assets/final/states/state_confirmed_object.png",
          expired: "assets/final/states/state_expired_link_object.png",
          low: "assets/final/states/state_insufficient_response_object.png",
          negotiating: "assets/final/states/state_private_negotiation_object.png",
        };
        const src = graphicMap[variant] || graphicMap.low;
        return `
          <div class="StateGraphic" data-variant="${variant}" role="img" aria-label="${escapeHtml(label)}">
            <img class="StateGraphicImage" src="${src}" alt="" aria-hidden="true" />
          </div>
        `;
      }

      function preferenceSelector(candidate, selected, disabled = false) {
        const candidateId = candidate.id;
        const candidateLabel = `${candidate.label} ${candidate.time}`;
        return `
          <div class="PreferenceSelector" role="group" aria-label="${escapeHtml(formatTemplate(locale.ui.preferenceGroupLabel, { candidate: candidateLabel }))}">
            ${Object.entries(locale.status)
              .map(([key, label]) => {
                const meta = statusMeta[key];
                const pressed = selected === key;
                return `<button class="preferenceOption" type="button" data-action="set-preference" data-candidate-id="${escapeHtml(candidateId)}" data-status="${key}" data-testid="preference-${escapeHtml(candidateId)}-${key}" data-selected="${pressed}" aria-pressed="${pressed}" aria-label="${escapeHtml(formatTemplate(locale.ui.preferenceButtonLabel, { candidate: candidateLabel, status: label }))}" ${disabled ? "disabled" : ""}>
                  <span aria-hidden="true">${meta.icon}</span><span>${label}</span>
                </button>`;
              })
              .join("")}
          </div>
        `;
      }

      function candidateSlotCard(slot, options = {}) {
        const selectedStatus = normalizeStatus(options.selectedStatus || "available");
        const summary = options.summary;
        const selected = Boolean(options.selected);
        const disabled = Boolean(options.disabled);
        let chip = reasonChip(statusMeta[selectedStatus].className, locale.status[selectedStatus]);
        if (summary) {
          if (summary.excluded) chip = reasonChip("danger", locale.ui.candidateExcluded);
          else if (selected) chip = reasonChip("brand", locale.ui.candidateRecommended);
          else chip = reasonChip("success", formatTemplate(locale.ui.responseCount, { count: summary.answered }));
        }
        return `
          <article class="CandidateSlotCard" data-selected="${selected}" data-disabled="${disabled}">
            <div class="topline">
              <div class="slotMeta">
                <strong>${escapeHtml(slot.label)} ${escapeHtml(slot.time)}</strong>
                <span>${escapeHtml(slot.note)}</span>
              </div>
              ${chip}
            </div>
            ${summary ? `<p class="caption">${escapeHtml(formatTemplate(locale.ui.score, { score: summary.score }))} · ${escapeHtml(locale.status.prefer)} ${summary.counts.prefer} · ${escapeHtml(locale.status.available)} ${summary.counts.available} · ${escapeHtml(locale.status.adjustable)} ${summary.counts.adjustable} · ${escapeHtml(locale.status.hardNo)} ${summary.counts.hardNo}</p>` : ""}
            ${options.withSelector ? preferenceSelector(slot, selectedStatus, disabled) : ""}
          </article>
        `;
      }

      function responseCoverage(room, state = "enough") {
        const ranked = rankCandidates(room);
        const percent = Math.min(100, Math.round((ranked.responseCount / room.expectedCount) * 100));
        const need = Math.max(0, ranked.minimum - ranked.responseCount);
        const label = state === "blocked"
          ? `${room.expectedCount}명 중 ${ranked.responseCount}명이 답했지만, 추천 가능한 후보가 남지 않았어요.`
          : state === "low"
            ? `${room.expectedCount}명 중 ${ranked.responseCount}명이 답했어요. ${need}명만 더 답하면 추천을 시작해요.`
            : `${room.expectedCount}명 중 ${ranked.responseCount}명이 답했어요.`;
        const chipLabel = state === "blocked" ? "새 후보 필요" : state === "low" ? locale.coverageLabel.collecting : locale.coverageLabel.enough;
        return `
          <section class="ResponseCoverage" aria-label="응답률">
            <div class="topline">
              <h3>응답 현황</h3>
              ${reasonChip(state === "blocked" ? "danger" : state === "low" ? "warning" : "success", chipLabel)}
            </div>
            <div class="coverageTrack" aria-hidden="true"><div class="coverageFill" style="width: ${percent}%"></div></div>
            <p class="caption">${label}</p>
          </section>
        `;
      }

      function avatarStack(count = 5) {
        const tokens = Array.from({ length: Math.min(count, 8) }, (_, index) => {
          const type = index % 3 === 0 ? "success" : index % 3 === 1 ? "warning" : "";
          return `<span class="avatarToken ${type}" aria-hidden="true">${index + 1}</span>`;
        }).join("");
        return `<div class="ParticipantAvatarStack" aria-label="${count}명 응답 집계">${tokens}${count > 8 ? '<span class="avatarToken">+ </span>' : ""}</div>`;
      }

      function shareCopyBox(room, ranked) {
        const label = room.status === "closed" ? "확정 문구" : locale.shareLabel.template;
        const copy = room.status === "closed" ? buildConfirmedText(room, ranked) : buildRecommendationText(room, ranked);
        return `
          <section class="ShareCopyBox" aria-label="공유 문구">
            ${reasonChip(room.status === "closed" ? "success" : "success", label)}
            <p class="copyText">${escapeHtml(copy)}</p>
            <p class="helperText">${escapeHtml(locale.ui.kakaoPasteHint)}</p>
            ${appState.copyStatus ? `<p class="actionStatus" data-testid="copy-status">${escapeHtml(appState.copyStatus)}</p>` : ""}
          </section>
        `;
      }

      function generalShareLinkBox(room) {
        const shareUrl = room.shareUrl || buildGeneralShareUrl(room);
        return `
          <section class="linkField" aria-label="${escapeHtml(locale.ui.generalShareLink)}">
            ${reasonChip("brand", locale.ui.generalShareLink)}
            <p class="helperText">${escapeHtml(locale.ui.generalShareHint)}</p>
            <input class="textInput compactLinkInput" data-testid="general-share-link" value="${escapeHtml(shareUrl)}" readonly />
          </section>
        `;
      }

      function incomingInviteCard(room) {
        if (!room || !room.isSharedLink) return "";
        return `
          <section class="surface IncomingInviteCard" data-testid="invite-context-card" aria-label="${escapeHtml(locale.ui.incomingInviteTitle)}">
            ${reasonChip("success", locale.ui.incomingInviteTitle)}
            <div class="slotMeta">
              <strong>${escapeHtml(room.title)}</strong>
              <span>${escapeHtml(formatTemplate(locale.ui.incomingInviteMeta, { count: room.candidates.length, expected: room.expectedCount }))}</span>
            </div>
            <p class="helperText">${escapeHtml(formatTemplate(locale.ui.incomingInviteBody, { title: room.title }))}</p>
            <button class="candidateActionButton Button3D inviteResponseButton" type="button" data-action="respond-to-invite" data-testid="respond-to-invite-button">${escapeHtml(locale.ui.respondToInvite)}</button>
          </section>
        `;
      }

      function hostStatusCard(room, index) {
        const ranked = rankCandidates(room);
        const statusLabel = room.status === "closed"
          ? screenCopy("scr-06-room-closed").eyebrow
          : ranked.top
            ? screenCopy("scr-03-result-recommendation").eyebrow
            : screenCopy("scr-04-insufficient-response").eyebrow;
        return `
          <article class="HostStatusCard">
            <div class="slotMeta">
              <strong>${escapeHtml(room.title)}</strong>
              <span>${escapeHtml(formatTemplate(locale.ui.responseCount, { count: ranked.responseCount }))} · ${escapeHtml(statusLabel)}</span>
            </div>
            <div class="buttonRow">
              <button class="candidateActionButton" type="button" data-action="open-room-status" data-room-id="${escapeHtml(room.id)}" data-testid="open-room-status-${index}">${escapeHtml(locale.ui.openStatus)}</button>
              <button class="candidateActionButton" type="button" data-action="edit-host-room" data-room-id="${escapeHtml(room.id)}" data-testid="edit-host-room-${index}">${escapeHtml(locale.ui.editRoom)}</button>
              <button class="candidateActionButton" type="button" data-action="copy-room-link" data-room-id="${escapeHtml(room.id)}" data-testid="copy-room-link-${index}">${escapeHtml(locale.ui.copyLink)}</button>
              <button class="candidateActionButton dangerAction" type="button" data-action="delete-room" data-room-id="${escapeHtml(room.id)}" data-testid="delete-room-button-${index}">${escapeHtml(locale.ui.deleteRoomShort)}</button>
            </div>
          </article>
        `;
      }

      function actionAttrs(action, testId) {
        return `${action ? `data-action="${escapeHtml(action)}"` : ""} ${testId ? `data-testid="${escapeHtml(testId)}"` : ""}`;
      }

      function stickyBottomCTA(primary, secondary, options = {}) {
        const disabled = options.disabled ? 'disabled aria-disabled="true"' : "";
        const secondaryDisabled = options.secondaryDisabled ? 'disabled aria-disabled="true"' : "";
        const secondaryButton = secondary
          ? `<button class="quietButton Button3D" type="button" ${secondaryDisabled} ${actionAttrs(options.secondaryAction, options.secondaryTestId)}>${escapeHtml(secondary)}</button>`
          : "";
        return `
          <div class="StickyBottomCTA">
            <div class="buttonRow ${secondary ? "two" : ""}">
              <button class="${options.secondaryPrimary ? "secondaryButton" : "primaryButton"} Button3D" type="button" ${disabled} ${actionAttrs(options.primaryAction, options.primaryTestId)}>${escapeHtml(primary)}</button>
              ${secondaryButton}
            </div>
          </div>
        `;
      }

      function standardHeader(id, titleId) {
        const copy = screenCopy(id);
        return `
          <div class="section">
            <span class="eyebrow">${escapeHtml(copy.eyebrow)}</span>
            <h1 id="${escapeHtml(titleId)}">${escapeHtml(copy.title)}</h1>
            <p>${escapeHtml(copy.description)}</p>
          </div>
        `;
      }

      function renderCandidateInputs(room) {
        const candidates = [...room.candidates, ...localizedDefaultCandidates()].slice(0, Math.max(3, room.candidates.length));
        return candidates
          .map((candidate, index) => `
            <div class="candidateInputCard HostRoomEditor">
              <div class="candidateInputHeader">
                ${reasonChip(index === 0 ? "brand" : "success", formatTemplate(locale.ui.candidateLabel, { index: index + 1 }))}
                <button class="candidateActionButton" type="button" data-action="remove-candidate" data-candidate-index="${index}" data-testid="remove-candidate-${index}" ${candidates.length <= 2 ? "disabled" : ""}>${escapeHtml(locale.ui.removeCandidate)}</button>
              </div>
              <div class="formGrid dateTimeGrid">
                <label class="inputGroup">
                  <span class="inputLabel">날짜</span>
                  ${renderReleaseDateControl(candidate, index)}
                </label>
                <label class="inputGroup">
                  <span class="inputLabel">시간</span>
                  ${renderReleaseTimeControl(candidate, index)}
                </label>
              </div>
              <label class="inputGroup">
                <span class="inputLabel">장소/메모</span>
                <input class="textInput" data-testid="candidate-note-input-${index}" name="candidate-note-${index}" value="${escapeHtml(candidate.note)}" />
              </label>
            </div>
          `)
          .join("") +
          `<button class="candidateActionButton" type="button" data-action="add-candidate" data-testid="add-candidate-button" ${candidates.length >= MAX_CANDIDATES ? "disabled" : ""}>${escapeHtml(locale.ui.addCandidate)}</button>`;
      }

      function expectedCountOptions(selected) {
        const current = clampNumber(selected, 3, 20, 7);
        return Array.from({ length: 18 }, (_, index) => index + 3)
          .map((count) => `<option value="${count}" ${count === current ? "selected" : ""}>${count}명</option>`)
          .join("");
      }

      const renderers = {
        "scr-00-entry": () => {
          const copy = screenCopy("scr-00-entry");
          const ranked = appState.room ? rankCandidates(appState.room) : null;
          const hostedCount = appState.hostRooms?.length || 0;
          const hasIncomingInvite = Boolean(appState.room?.isSharedLink && appState.inviteContext?.status === "valid");
          const savedRoomLine = hasIncomingInvite
            ? formatTemplate(locale.ui.incomingInviteBody, { title: appState.room.title })
            : appState.room
            ? `최근 방: ${appState.room.title} · ${ranked.responseCount}명 응답`
            : locale.ui.emptyRoom;
          const primaryLabel = hasIncomingInvite ? locale.ui.respondToInvite : copy.primary;
          const secondaryLabel = hasIncomingInvite
            ? copy.primary
            : hostedCount
              ? locale.ui.savedMeetupsTitle
              : locale.ui.roomUnavailable;
          return `
            <section id="scr-00-entry" class="screen" aria-labelledby="entry-title">
              <div class="screenBody">
                <img class="heroAnimalImage" src="assets/final/hero/hero_animals_calendar_full_square.png" alt="동물 친구들이 달력과 시계를 보며 모임 시간을 정하는 그림" />
                <div class="section">
                  <span class="eyebrow">${escapeHtml(locale.brand.name)}</span>
                  <h1 id="entry-title">${escapeHtml(copy.title)}</h1>
                  <p>${escapeHtml(copy.description)}</p>
                </div>
                ${hasIncomingInvite ? incomingInviteCard(appState.room) : ""}
                <div class="surface compactSection">
                  ${reasonChip("brand", locale.ui.currentStatus)}
                  <p class="caption">${escapeHtml(locale.ui.entryCaption)}</p>
                  <p class="emptyStateLine">${escapeHtml(savedRoomLine)}</p>
                  ${hostedCount ? `<p class="helperText">${escapeHtml(locale.ui.savedMeetupsTitle)} ${hostedCount}</p>` : ""}
                </div>
              </div>
              ${stickyBottomCTA(primaryLabel, secondaryLabel, {
                primaryAction: hasIncomingInvite ? "respond-to-invite" : "start-create-room",
                primaryTestId: "start-create-room",
                secondaryAction: hasIncomingInvite ? "start-create-room" : hostedCount ? "open-host-dashboard" : null,
                secondaryTestId: hasIncomingInvite ? "start-create-room-secondary" : hostedCount ? "open-host-dashboard-button" : null,
