<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>함모여</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --brand: #6B5CFF;
        --brand-pressed: #5A46F2;
        --brand-soft: #EDEBFF;
        --background: #F7F8FC;
        --surface: #FFFFFF;
        --surface-raised: #FFFFFF;
        --text-primary: #0F172A;
        --text-secondary: #64748B;
        --text-tertiary: #94A3B8;
        --border: #E5E8F1;
        --success: #22C55E;
        --success-soft: #EAFBF1;
        --warning: #F59E0B;
        --warning-soft: #FFF6DB;
        --danger: #EF4444;
        --danger-soft: #FFF0EF;
        --info: #3B82F6;
        --page-padding: 20px;
        --section-gap: 32px;
        --card-padding: 16px;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 18px;
        --radius-xl: 24px;
        --radius-pill: 999px;
        --touch-target: 44px;
        --bottom-cta-height: 56px;
        --bottom-nav-height: 86px;
        --mobile-cta-reserved: 160px;
        --shadow-card: 0 8px 24px rgba(28, 39, 63, 0.08);
        --shadow-floating: 0 12px 36px rgba(63, 63, 120, 0.14);
        --shadow-pressed: 0 2px 8px rgba(28, 39, 63, 0.10);
        --motion-fast: 140ms;
        --motion-base: 200ms;
        --motion-slow: 280ms;
        --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--background);
      }

      body {
        margin: 0;
        color: var(--text-primary);
        background: var(--background);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 3px solid rgba(90, 70, 242, 0.26);
        outline-offset: 2px;
      }

      .page {
        min-height: 100dvh;
        padding: 24px;
      }

      .layout {
        width: min(1080px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(320px, 430px) minmax(280px, 1fr);
        gap: 24px;
        align-items: start;
      }

      .phone {
        position: sticky;
        top: 24px;
        width: 100%;
        max-width: 430px;
        max-height: calc(100dvh - 48px);
        min-height: min(820px, calc(100dvh - 48px));
        border: 1px solid var(--border);
        border-radius: 30px;
        background: var(--surface);
        box-shadow: var(--shadow-floating);
        overflow-x: hidden;
        overflow-y: auto;
      }

      .app {
        position: relative;
        min-height: min(820px, calc(100dvh - 48px));
        display: flex;
        flex-direction: column;
        background: var(--background);
        overflow: hidden;
      }

      .AnimalBackground {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(247, 248, 252, 0.62) 0%, rgba(247, 248, 252, 0.88) 48%, rgba(247, 248, 252, 0.98) 100%),
          url("assets/final/backgrounds/background_sparse_pattern_example.png") center top / cover no-repeat,
          url("assets/final/hero/hero_animals_calendar_full_square.png") center bottom 28px / min(86%, 360px) no-repeat;
        opacity: 0.34;
      }

      .topbar,
      .screenRoot,
      .BottomNav {
        position: relative;
        z-index: 1;
      }

      .topbar {
        min-height: 60px;
        padding: 14px var(--page-padding) 10px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
      }

      .brand {
        min-height: var(--touch-target);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brandMark,
      .brandHomeButton,
      .topbarButton {
        min-height: var(--touch-target);
        min-width: var(--touch-target);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 0;
        border-radius: var(--radius-pill);
        background: transparent;
      }

      .brandHomeButton {
        min-width: var(--touch-target);
        padding: 0 6px 0 0;
        color: var(--text-primary);
      }

      .brandMark {
        min-width: 0;
        color: var(--text-primary);
        pointer-events: none;
      }

      .brand strong {
        font-size: 18px;
        line-height: 26px;
        font-weight: 700;
      }

      .brandHomeButton span,
      .brandMark span {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 16px;
        font-weight: 800;
      }

      .topbarActions {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        min-width: 0;
      }

      .topbarButton {
        padding: 0 12px;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        background: linear-gradient(180deg, #ffffff 0%, #f7f9ff 100%);
        box-shadow:
          0 7px 0 rgba(152, 162, 179, 0.12),
          0 14px 22px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        font-size: 12px;
        line-height: 16px;
        font-weight: 800;
      }

      .topbarButton:hover,
      .brandHomeButton:hover {
        background: var(--surface-raised);
      }


      .screenRoot {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: var(--section-gap);
        padding: var(--page-padding);
        padding-bottom: calc(var(--page-padding) + env(safe-area-inset-bottom, 0px));
        animation: screenEnter var(--motion-slow) var(--ease-standard);
      }

      .screenBody {
        display: flex;
        flex-direction: column;
        gap: var(--section-gap);
      }

      .screenBody > * {
        flex-shrink: 0;
      }

      .section {
        display: grid;
        gap: 12px;
      }

      .compactSection {
        display: grid;
        gap: 10px;
      }

      .eyebrow,
      .microLabel {
        color: var(--brand);
        font-size: 13px;
        line-height: 18px;
        font-weight: 700;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 36px;
        font-weight: 700;
      }

      h2 {
        font-size: 22px;
        line-height: 30px;
        font-weight: 700;
      }

      h3 {
        font-size: 18px;
        line-height: 26px;
        font-weight: 600;
      }

      p {
        color: var(--text-secondary);
        font-size: 16px;
        line-height: 24px;
        font-weight: 400;
      }

      .caption {
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 20px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .pill,
      .ReasonChip {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        max-width: 100%;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        color: var(--text-secondary);
        background: var(--surface);
        font-size: 12px;
        line-height: 16px;
        font-weight: 700;
        white-space: normal;
      }

      .ReasonChip {
        white-space: nowrap;
        font-size: 13px;
        line-height: 18px;
      }

      .ReasonChip.success {
        border-color: transparent;
        color: #147D55;
        background: var(--success-soft);
      }

      .ReasonChip.warning {
        border-color: transparent;
        color: #8A5A12;
        background: var(--warning-soft);
      }

      .ReasonChip.danger {
        border-color: transparent;
        color: #B63B3B;
        background: var(--danger-soft);
      }

      .ReasonChip.brand {
        border-color: transparent;
        color: var(--brand);
        background: var(--brand-soft);
      }

      .surface,
      .CandidateSlotCard,
      .RecommendationHeroCard,
      .ShareCopyBox,
      .ResponseCoverage,
      .AgreementModeSelector,
      .AgreementChangeSheet,
      .AnonymousAggregatePanel,
      .AgreementNotice {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.92);
        box-shadow:
          0 8px 0 rgba(152, 162, 179, 0.09),
          0 18px 30px rgba(28, 39, 63, 0.10),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(14px);
      }

      .surface,
      .CandidateSlotCard,
      .ShareCopyBox,
      .ResponseCoverage,
      .AgreementModeSelector,
      .AgreementChangeSheet,
      .AnonymousAggregatePanel,
      .AgreementNotice {
        padding: var(--card-padding);
      }

      .RecommendationHeroCard {
        position: relative;
        display: block;
        padding: 18px;
        border-radius: var(--radius-xl);
        border-color: rgba(90, 70, 242, 0.18);
        background: var(--brand-soft);
        box-shadow: var(--shadow-floating);
        overflow: hidden;
      }

      .RecommendationHeroContent {
        position: relative;
        display: grid;
        gap: 14px;
      }

      .CandidateSlotCard {
        display: grid;
        gap: 12px;
        transition:
          transform var(--motion-base) var(--ease-standard),
          border-color var(--motion-base) var(--ease-standard),
          box-shadow var(--motion-base) var(--ease-standard);
      }

      .CandidateSlotCard[data-selected="true"] {
        border-color: rgba(90, 70, 242, 0.38);
        box-shadow: var(--shadow-floating);
      }

      .CandidateSlotCard[data-disabled="true"] {
        opacity: 0.66;
      }

      .CandidateSlotCard.compact {
        box-shadow: none;
      }

      .AgreementModeSelector,
      .AgreementChangeSheet,
      .AnonymousAggregatePanel,
      .AgreementNotice {
        display: grid;
        gap: 12px;
      }

      .AgreementModeGrid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .AgreementModeButton {
        min-height: 78px;
        display: grid;
        align-content: center;
        gap: 6px;
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 249, 255, 0.92));
        box-shadow:
          0 6px 0 rgba(152, 162, 179, 0.11),
          0 12px 22px rgba(28, 39, 63, 0.07),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
        text-align: left;
      }

      .AgreementModeButton[data-selected="true"] {
        border-color: rgba(90, 70, 242, 0.44);
        color: var(--brand);
        background: linear-gradient(180deg, rgba(246, 243, 255, 0.98), rgba(234, 228, 255, 0.94));
        box-shadow:
          0 7px 0 rgba(73, 56, 214, 0.2),
          0 16px 28px rgba(90, 70, 242, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
      }

      .AgreementModeButton strong {
        font-size: 16px;
        line-height: 22px;
        font-weight: 950;
      }

      .AgreementModeButton span {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 19px;
        font-weight: 750;
      }

      .AgreementMinimumRow {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: end;
      }

      .AnonymousAggregateList {
        display: grid;
        gap: 10px;
      }

      .AnonymousAggregateCard {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(229, 232, 241, 0.94);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.82);
      }

      .AgreementNotice {
        border-color: rgba(90, 70, 242, 0.2);
        background: var(--brand-soft);
      }

      .slotMeta {
        display: grid;
        gap: 2px;
      }

      .slotMeta strong,
      .ShareCopyBox strong {
        color: var(--text-primary);
        font-size: 18px;
        line-height: 25px;
        font-weight: 800;
      }

      .slotMeta span {
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 20px;
      }

      .PreferenceSelector {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .preferenceOption {
        min-height: var(--touch-target);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
        box-shadow:
          0 5px 0 rgba(152, 162, 179, 0.10),
          0 10px 18px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        font-size: 13px;
        line-height: 18px;
        font-weight: 700;
        transition:
          transform var(--motion-fast) var(--ease-standard),
          box-shadow var(--motion-fast) var(--ease-standard),
          border-color var(--motion-fast) var(--ease-standard);
      }

      .preferenceOption[data-selected="true"] {
        box-shadow:
          0 2px 0 rgba(152, 162, 179, 0.14),
          0 6px 12px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .preferenceOption[data-status="prefer"][data-selected="true"] {
        border-color: var(--brand);
        color: var(--surface);
        background: var(--brand);
      }

      .preferenceOption[data-status="available"][data-selected="true"] {
        border-color: #BCEBD7;
        color: #147D55;
        background: var(--success-soft);
      }

      .preferenceOption[data-status="adjustable"][data-selected="true"] {
        border-color: #F7D58A;
        color: #8A5A12;
        background: var(--warning-soft);
      }

      .preferenceOption[data-status="hardNo"][data-selected="true"] {
        border-color: #F6C2C2;
        color: #B63B3B;
        background: var(--danger-soft);
      }

      .StateGraphic {
        min-height: 156px;
        display: grid;
        place-items: center;
        isolation: isolate;
      }

      .StateGraphicImage {
        display: block;
        width: min(180px, 62vw);
        max-height: 190px;
        object-fit: contain;
        filter: drop-shadow(0 18px 34px rgba(91, 70, 242, 0.12));
      }

      .ParticipantAvatarStack {
        display: flex;
        align-items: center;
        min-height: var(--touch-target);
      }

      .avatarToken {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        margin-left: -6px;
        border: 2px solid var(--surface);
        border-radius: 50%;
        color: var(--brand);
        background: var(--brand-soft);
        font-size: 11px;
        line-height: 1;
        font-weight: 800;
      }

      .avatarToken:first-child {
        margin-left: 0;
      }

      .avatarToken.success {
        color: #147D55;
        background: var(--success-soft);
      }

      .avatarToken.warning {
        color: #8A5A12;
        background: var(--warning-soft);
      }

      .metricGrid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 68px;
        display: grid;
        align-content: center;
        gap: 2px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface-raised);
      }

      .metric b {
        color: var(--text-primary);
        font-size: 20px;
        line-height: 26px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .metric span {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 16px;
        font-weight: 600;
      }

      .coverageTrack {
        height: 8px;
        border-radius: var(--radius-pill);
        background: var(--border);
        overflow: hidden;
      }

      .coverageFill {
        height: 100%;
        border-radius: inherit;
        background: var(--brand);
      }

      .ShareCopyBox {
        display: grid;
        gap: 10px;
      }

      .copyText {
        color: var(--text-primary);
        font-size: 16px;
        line-height: 24px;
      }

      .settingsList {
        display: grid;
        gap: 10px;
      }

      .settingsItem {
        display: grid;
        gap: 4px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface);
      }

      .settingsItem strong {
        color: var(--text-primary);
        font-size: 15px;
        line-height: 22px;
      }

      .settingsItem span {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 18px;
      }

      .StickyBottomCTA {
        position: sticky;
        bottom: 12px;
        display: grid;
        gap: 8px;
        margin-top: auto;
        padding-top: 12px;
        padding-bottom: 12px;
        background: linear-gradient(
          rgba(245, 247, 251, 0),
          var(--background) 18px,
          var(--background)
        );
      }

      .BottomNav {
        flex-shrink: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(76px, 1.35fr) minmax(0, 1fr) minmax(0, 1fr);
        align-items: end;
        gap: 4px;
        min-height: var(--bottom-nav-height);
        margin: 0 10px;
        padding: 6px 8px calc(6px + env(safe-area-inset-bottom, 0px));
        border: 1px solid var(--border);
        border-bottom: 0;
        border-radius: 24px 24px 0 0;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 -12px 30px rgba(71, 102, 146, 0.15);
        backdrop-filter: blur(18px);
      }

      .BottomNavItem {
        position: relative;
        overflow: hidden;
        min-width: 0;
        min-height: 58px;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 4px;
        border: 0;
        border-radius: 18px;
        color: var(--text-primary);
        background: transparent;
        font-size: 11px;
        line-height: 14px;
        font-weight: 900;
      }

      .BottomNavItem::before {
        display: none;
        content: "";
      }

      .BottomNavItem[data-active="true"]::before {
        display: none;
      }

      .BottomNavLabel {
        position: relative;
        z-index: 1;
        min-width: 0;
        display: block;
        color: #111827;
        text-shadow: none;
        font-size: 12px;
        line-height: 15px;
        font-weight: 950;
        text-align: center;
      }

      .BottomNavItem[data-active="true"] {
        color: var(--text-primary);
      }

      .BottomNavIcon {
        position: relative;
        z-index: 1;
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-pill);
        font-size: 19px;
        color: #111827;
      }

      .BottomNavItem[data-center="true"] {
        margin-top: -32px;
        color: var(--brand);
      }

      .BottomNavItem[data-center="true"] .BottomNavLabel {
        width: min(76px, 100%);
        max-width: 100%;
        margin-top: 2px;
        padding: 3px 4px;
        border-radius: var(--radius-pill);
        color: var(--surface);
        background: var(--brand);
        box-shadow: 0 5px 12px rgba(90, 70, 242, 0.24);
        font-size: 12px;
        line-height: 14px;
        white-space: nowrap;
      }

      .BottomNavItem[data-center="true"] .BottomNavIcon {
        width: 64px;
        height: 64px;
        border: 5px solid #F7FBFF;
        color: var(--surface);
        background: linear-gradient(180deg, #8EA0FF 0%, var(--brand) 58%, var(--brand-pressed) 100%);
        box-shadow:
          0 9px 0 #4433C9,
          0 18px 32px rgba(90, 70, 242, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.44);
        font-size: 34px;
      }

      .buttonRow {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .buttonRow.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .HostStatusCard .buttonRow,
      .settingsItem .buttonRow {
        width: 100%;
        grid-template-columns: 1fr;
      }

      .primaryButton,
      .secondaryButton,
      .quietButton {
        min-height: var(--bottom-cta-height);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 0 14px;
        border-radius: var(--radius-lg);
        font-size: 16px;
        line-height: 24px;
        font-weight: 800;
        transition:
          transform var(--motion-fast) var(--ease-standard),
          box-shadow var(--motion-fast) var(--ease-standard),
          background var(--motion-base) var(--ease-standard);
      }

      .primaryButton {
        border: 0;
        color: var(--surface);
        background: linear-gradient(180deg, #7C70FF 0%, var(--brand) 54%, var(--brand-pressed) 100%);
        box-shadow:
          0 9px 0 #4433C9,
          0 18px 32px rgba(90, 70, 242, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
      }

      .primaryButton:active,
      .secondaryButton:active,
      .quietButton:active,
      .preferenceOption:active,
      .candidateActionButton:active {
        transform: translateY(3px);
        box-shadow:
          0 2px 0 rgba(28, 39, 63, 0.16),
          0 7px 14px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .primaryButton:hover {
        background: linear-gradient(180deg, #8478FF 0%, var(--brand) 54%, var(--brand-pressed) 100%);
      }

      .secondaryButton {
        border: 1px solid transparent;
        color: var(--brand);
        background: linear-gradient(180deg, #ffffff 0%, var(--brand-soft) 100%);
        box-shadow:
          0 8px 0 rgba(90, 70, 242, 0.14),

      .ParticipantPickerPanel,

        gap: 12px;
        padding: var(--card-padding);
        border: 1px solid rgba(90, 70, 242, 0.14);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.9);
        box-shadow:
          0 8px 0 rgba(152, 162, 179, 0.08),
          0 16px 26px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);

        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;

        line-height: 16px;
      }

        padding: 8px 12px;

        border-radius: var(--radius-md);
        color: var(--text-primary);
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
        box-shadow:
          0 5px 0 rgba(152, 162, 179, 0.10),
          0 10px 18px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);

        line-height: 18px;
        font-weight: 900;
      }

        color: var(--surface);
        border-color: transparent;
        background: linear-gradient(180deg, #7D6BFF 0%, var(--brand) 100%);

          0 14px 24px rgba(90, 70, 242, 0.22);

        background: var(--success-soft);
      }

        gap: 8px;

        display: grid;
        gap: 8px;
      }

      .CustomChoiceTrigger {

        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 255, 0.98) 100%),
          var(--surface);
        box-shadow:
          0 5px 0 rgba(152, 162, 179, 0.10),
          0 10px 18px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
        font-size: 15px;
        line-height: 20px;
        font-weight: 900;
        text-align: left;
      }

      }

      .CustomChoiceChevron {
        flex: 0 0 auto;
        color: var(--text-tertiary);
        font-size: 16px;
        line-height: 1;
      }

      .CustomChoicePopover {
        position: fixed;
        top: 150px;
        left: 50%;
        right: auto;
        width: min(330px, calc(100vw - 40px));
        transform: translateX(-50%);
        z-index: 34;

        gap: 6px;
        max-height: min(312px, 58dvh);
        padding: 8px;
        border: 1px solid rgba(229, 232, 241, 0.92);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow:
          0 18px 42px rgba(28, 39, 63, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
        overflow-y: auto;

        align-items: center;

        color: var(--text-primary);
        background: transparent;
        font-size: 15px;
        line-height: 20px;
        font-weight: 900;
        text-align: left;
      }

      .CustomChoiceOption[data-selected="true"] {
        color: var(--surface);
        background: var(--brand);
        box-shadow: 0 8px 18px rgba(90, 70, 242, 0.20);
      }

      .CustomExpectedCountInput {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(116px, auto);
        gap: 8px;
        align-items: center;
      }

      .CustomExpectedCountInput[hidden] {
        display: none;
      }

      .CustomExpectedCountInput .textInput {
        min-height: 44px;
      }

      .candidateInputCard {
        display: grid;
        gap: 10px;
        padding: var(--card-padding);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.94);
        box-shadow:
          0 8px 0 rgba(152, 162, 179, 0.08),
          0 16px 26px rgba(28, 39, 63, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
      }

      .ReleaseTimeControl,
      .IPhoneCalendarPicker,
      .ReleaseTimeWheel {
        display: grid;
        gap: 8px;
      }

      .IPhoneCalendarPicker {
        position: relative;
      }

        min-height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        color: var(--text-primary);
        background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);

        font-weight: 900;

        display: none;

        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--text-primary);
        font-size: 13px;
        line-height: 18px;
        font-weight: 900;

        text-align: center;

        background: transparent;
        font-size: 12px;
        line-height: 16px;
        font-weight: 900;

        color: var(--text-tertiary);
        opacity: 0.56;
      }

        color: var(--surface);
        border-color: transparent;
        background: linear-gradient(180deg, var(--brand) 0%, var(--brand-pressed) 100%);
        box-shadow: 0 8px 18px rgba(91, 70, 242, 0.22);
      }

        position: relative;
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(245, 247, 255, 0.96) 100%);

      .ReleaseTimeWheel::before {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 50%;
        height: 34px;
        border-radius: var(--radius-pill);
        background: rgba(237, 235, 255, 0.88);
        transform: translateY(-50%);
        pointer-events: none;
      }

      .ReleaseTimeWheelColumn {
        position: relative;
        z-index: 1;
        max-height: 104px;
        display: grid;
        gap: 2px;
        overflow-y: auto;
        overscroll-behavior: contain;
        scroll-snap-type: y mandatory;
        scrollbar-width: none;
      }

      .ReleaseTimeWheelColumn::-webkit-scrollbar {
        display: none;

      .ReleaseTimeWheelOption {
        width: 100%;
        min-height: 32px;
        padding: 0 6px;
        border: 0;
        border-radius: 13px;

        line-height: 18px;
        font-weight: 900;

        box-shadow: 0 8px 18px rgba(91, 70, 242, 0.22);

          0 2px 0 rgba(255, 255, 255, 0.95),
          0 12px 26px rgba(90, 70, 242, 0.22);

        display: none;
      }

        padding: 10px 12px;

        color: #1D4ED8;

          0 10px 0 rgba(90, 70, 242, 0.10),

        background: linear-gradient(180deg, #ffffff 0%, #f7f9ff 100%);
        box-shadow:
          0 5px 0 rgba(152, 162, 179, 0.12),

          inset 0 1px 0 rgba(255, 255, 255, 0.98);

      function normalizeAgreementMode(mode) {
        return Object.prototype.hasOwnProperty.call(agreementModes, mode) ? mode : "all_together";
      }

      function agreementLabel(mode) {
        const normalized = normalizeAgreementMode(mode);

      const escapeHtml = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      function formatTemplate(template, values = {}) {
        return String(template || "").replace(/\{(\w+)\}/g, (_, key) => String(values[key] ?? ""));
      }

      function toBase64Url(value) {
        const bytes = new TextEncoder().encode(JSON.stringify(value));
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }

      function fromBase64Url(value) {
        try {
          const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
          const binary = atob(padded);
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          return JSON.parse(new TextDecoder().decode(bytes));
        } catch {
          return null;
        }
      }

      function weekdayLabel(dateValue) {
        if (!dateValue) return "";
        const date = new Date(`${dateValue}T00:00:00`);
        if (Number.isNaN(date.getTime())) return "";
        const weekdays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
        return `${date.getMonth() + 1}.${date.getDate()} ${weekdays[date.getDay()]}`;
      }

      function dateParts(dateValue) {
        const [year, month, day] = String(dateValue || "").split("-").map((part) => Number.parseInt(part, 10));
        if (!year || !month || !day) return { year: 2026, month: 7, day: 5 };
        return { year, month, day };
      }

      function formatDateValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function releaseMonthLabel(dateValue) {
        const { year, month } = dateParts(dateValue);
        return `${year}년 ${month}월`;
      }

      function shiftMonthDateValue(dateValue, delta) {
        const { year, month, day } = dateParts(dateValue);
        const date = new Date(year, month - 1 + delta, Math.min(day, 28));
        return formatDateValue(date);
      }

      function releaseCalendarDates(selectedDate) {
        const { year, month } = dateParts(selectedDate);
        const first = new Date(year, month - 1, 1);
        const start = new Date(first);
        start.setDate(first.getDate() - first.getDay());
        return Array.from({ length: 42 }, (_, index) => {
          const date = new Date(start);
          date.setDate(start.getDate() + index);
          return {
            value: formatDateValue(date),
            day: date.getDate(),
            outside: date.getMonth() !== month - 1,
          };
        });
      }

      function parseTimeParts(timeValue) {
        const [rawHour, rawMinute] = String(timeValue || "18:30").split(":");
        const hour = Math.min(23, Math.max(0, Number.parseInt(rawHour, 10) || 0));
        const minute = ["00", "10", "20", "30", "40", "50"].includes(rawMinute) ? rawMinute : "30";
        return { hour, minute };
      }

      function formatTimeValue(hour, minute) {
        return `${String(Math.min(23, Math.max(0, hour))).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
      }

      function buildContinuousHourValues() {
        return Array.from({ length: 24 }, (_, hour) => hour);
      }

      function buildContinuousMinuteValues() {
        return ["00", "10", "20", "30", "40", "50"];
      }

      function parseDeadlineParts(value) {
        const fallbackDate = releaseDateValues[0] || formatDateValue(new Date());
        const fallbackTime = "22:00";
        const match = String(value || "").match(/(\d{1,2})\.(\d{1,2}).*?(\d{1,2}):(\d{2})/);
        if (!match) return { date: fallbackDate, time: fallbackTime };
        const [, month, day, hour, minute] = match;
        const date = formatDateValue(new Date(2026, Number(month) - 1, Number(day)));
        const parsedTime = parseTimeParts(`${hour}:${minute}`);
        return { date, time: formatTimeValue(parsedTime.hour, parsedTime.minute) };
      }

      function formatDeadlineLabel(date, time) {
        return `${weekdayLabel(date)} ${time}`;
      }

      function renderTimeWheel({ selectedTime, testPrefix, action, candidateIndex = null, ariaLabel, wheelTestId = "" }) {
        const { hour, minute } = parseTimeParts(selectedTime);
        const candidateAttr = candidateIndex === null ? "" : `data-candidate-index="${candidateIndex}"`;
        const wheelId = wheelTestId || `${testPrefix}-wheel`;
        const optionTestId = (part, token) => candidateIndex === null
          ? `${testPrefix}-${part}-${token}`

        return `
