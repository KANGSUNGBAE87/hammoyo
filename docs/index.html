      function createShareSnapshot(room) {
        return {
          v: 1,
          id: room.id,
          inviteSlug: room.inviteSlug || room.id,
          title: room.title,
          expectedCount: room.expectedCount,
          deadlineLabel: room.deadlineLabel,
          agreementMode: normalizeAgreementMode(room.agreementMode),
          minimumAttendees: agreementMinimum(room),
          agreementRevision: room.agreementRevision || 0,
          previousAgreementMode: room.previousAgreementMode || null,
          previousMinimumAttendees: room.previousMinimumAttendees || null,
          agreementChangedAt: room.agreementChangedAt || null,
          participants: namedParticipants(room),
          candidates: room.candidates.map((candidate) => ({
            id: candidate.id,
            date: candidate.date || "",
            label: candidate.label,
            time: candidate.time,
            starts_at: candidate.starts_at || "",
            note: candidate.note,
          })),
        };
      }

      function buildGeneralShareUrl(room) {
        const url = new URL(window.location.href);
        url.search = "";
        url.hash = "";
        url.searchParams.set("screen", "scr-00-entry");
        url.searchParams.set("join", toBase64Url(createShareSnapshot(room)));
        return url.toString();
      }

      function buildParticipantShareUrl(room, participant) {
        const url = new URL(room.shareUrl || buildGeneralShareUrl(room));
        url.searchParams.set("participant", participant.id);
        return url.toString();
      }

      function publicRoomFromShareSnapshot(snapshot) {
        if (!snapshot || snapshot.v !== 1 || !Array.isArray(snapshot.candidates)) return null;
        return createDemoRoom({
          id: snapshot.id || `shared-${Date.now().toString(36)}`,
          inviteSlug: snapshot.inviteSlug || snapshot.id || "",
          title: snapshot.title || localizedDemoFixture().title,
          expectedCount: snapshot.expectedCount || 4,
          deadlineLabel: snapshot.deadlineLabel || localizedDemoFixture().deadlineLabel,
          agreementMode: snapshot.agreementMode,
          minimumAttendees: snapshot.minimumAttendees,
          agreementRevision: snapshot.agreementRevision || 0,
          previousAgreementMode: snapshot.previousAgreementMode || null,
          previousMinimumAttendees: snapshot.previousMinimumAttendees || null,
          agreementChangedAt: snapshot.agreementChangedAt || null,
          participants: Array.isArray(snapshot.participants) ? snapshot.participants : [],
          candidates: snapshot.candidates.slice(0, MAX_CANDIDATES),
          responses: [],
          status: "collecting",
          isSharedLink: true,
        });
      }

      function currentStorageKey() {
        return isDemoMode() ? DEMO_STORAGE_KEY : STORAGE_KEY;
      }

      function getInitialLocale() {
        return "ko";
      }

      function applyLocale(nextLocale) {
        activeLocale = "ko";
        locale = locales[activeLocale];
        document.documentElement.lang = activeLocale;
        const phoneFrame = document.querySelector(".phone");
        if (phoneFrame) phoneFrame.setAttribute("aria-label", locale.ui.phoneLabel);
      }

      const screenCopy = (id) => locale.screens[id];

      const isAiEnabled = () => {
        return document.body.dataset.aiCopyEnabled === "true";
      };

      const isDemoMode = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get("demo") === "1";
      };

      const isDebugMode = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get("debug") === "1";
      };

      function applyDebugMode() {
        document.body.dataset.debugPanels = isDebugMode() ? "true" : "false";
      }

      const isTerminalRoom = (room) => room.status === "closed" || room.status === "expired";
      const isRoomRevoked = (room) => Boolean(room?.id && (appState?.revokedRoomIds || []).includes(room.id));

      function normalizeStatus(status) {
        return Object.prototype.hasOwnProperty.call(statusMeta, status) ? status : "available";
      }

      function clampNumber(value, min, max, fallback) {
        const next = Number.parseInt(value, 10);
        if (!Number.isFinite(next)) return fallback;
        return Math.min(max, Math.max(min, next));
      }

      function minimumResponses(expectedCount) {
        const safeExpected = Number.isFinite(Number(expectedCount)) ? Number(expectedCount) : 4;
        return Math.max(3, Math.ceil(safeExpected * 0.6));
      }

      function defaultMinimumAttendees(expectedCount) {
        return minimumResponses(expectedCount);
      }

      function normalizeMinimumAttendees(value, expectedCount) {
        const expected = clampNumber(expectedCount, 3, 20, 7);
        return clampNumber(value, 2, expected, defaultMinimumAttendees(expected));
      }

      function agreementMinimum(room) {
        return normalizeMinimumAttendees(room?.minimumAttendees, room?.expectedCount || 7);
      }

      function requiredResponsesForAgreement(room) {
        const mode = normalizeAgreementMode(room?.agreementMode);
        return mode === "all_together" ? minimumResponses(room?.expectedCount || 7) : agreementMinimum(room);
      }

      function participantIdForIndex(index) {
        return `participant-${index + 1}`;
      }

      function normalizeParticipant(participant, index) {
        return {
          id: String(participant?.id || participant?.participantId || participantIdForIndex(index)).trim(),
          name: String(participant?.name || participant?.alias || "").trim(),
        };
      }

      function normalizeParticipants(participants, expectedCount) {
        const count = clampNumber(expectedCount, 3, 20, 7);
        const raw = Array.isArray(participants) ? participants : [];
        return Array.from({ length: count }, (_, index) => normalizeParticipant(raw[index], index));
      }

      function namedParticipants(room) {
        return normalizeParticipants(room?.participants, room?.expectedCount || 7).filter((participant) => participant.name);
      }

      function participantNames(room) {
        return new Set(namedParticipants(room).map((participant) => participant.name));
      }

      function participantStats(room) {
        const roster = namedParticipants(room);
        const answeredIds = new Set((room?.responses || []).map((response) => response.participantId).filter(Boolean));
        const answeredNames = new Set((room?.responses || []).map((response) => response.alias).filter(Boolean));
        const answered = roster.length
          ? roster.filter((participant) => answeredIds.has(participant.id) || answeredNames.has(participant.name)).length
          : (room?.responses || []).length;
        const expected = clampNumber(room?.expectedCount, 3, 20, 7);
        const missingParticipants = roster.filter((participant) => !answeredIds.has(participant.id) && !answeredNames.has(participant.name));
        return {
          expected,
          roster,
          answered,
          missing: roster.length ? Math.max(0, roster.length - answered) : Math.max(0, expected - answered),
          missingParticipants,
        };
      }

      function rosterValidationError(room) {
        const participants = normalizeParticipants(room?.participants, room?.expectedCount || 7);
        if (participants.some((participant) => !participant.name)) return "참여자 이름을 모두 입력해주세요.";
        const names = participants.map((participant) => participant.name);
        const unique = new Set(names);
        if (unique.size !== names.length) return "참여자 이름이 중복되지 않게 입력해주세요.";
        return "";
      }

      function normalizeCandidate(candidate, index) {
        const fallback = localizedDefaultCandidates()[index] || localizedDefaultCandidates()[0];
        const date = String(candidate?.date || "").trim();
        const time = String(candidate?.time || fallback.time).trim();
        const explicitStartsAt = String(candidate?.starts_at || candidate?.startsAt || "").trim();
        const label = String(candidate?.label || weekdayLabel(date) || fallback.label).trim();
        return {
          id: candidate?.id || `slot-${index + 1}`,
          date,
          label,
          time,
          starts_at: explicitStartsAt || (date && time ? `${date}T${time}` : ""),
          note: String(candidate?.note || fallback.note).trim(),
        };
      }

      function normalizeResponse(response, index) {
        const preferences = {};
        Object.entries(response?.preferences || {}).forEach(([candidateId, status]) => {
          preferences[candidateId] = normalizeStatus(status);
        });
        return {
          id: response?.id || `response-${index + 1}`,
          participantId: String(response?.participantId || response?.participant_id || "").trim(),
          alias: String(response?.alias || `참여자 ${index + 1}`).trim(),
          preferences,
          updatedAt: response?.updatedAt || new Date().toISOString(),
        };
      }

      function createDemoRoom(options = {}) {
        const fixture = localizedDemoFixture();
        const candidates = (options.candidates || fixture.candidates)
          .slice(0, MAX_CANDIDATES)
          .map((candidate, index) => normalizeCandidate(candidate, index));
        const expectedCount = clampNumber(options.expectedCount, 3, 20, 7);
        const room = {
          id: options.id || `room-${Date.now().toString(36)}`,
          title: String(options.title || fixture.title).trim(),
          expectedCount,
          deadlineLabel: String(options.deadlineLabel || fixture.deadlineLabel).trim(),
          participants: normalizeParticipants(options.participants, expectedCount),
          candidates,
          responses: (options.responses || []).map(normalizeResponse),
          agreementMode: normalizeAgreementMode(options.agreementMode),
          minimumAttendees: normalizeMinimumAttendees(options.minimumAttendees, expectedCount),
          agreementRevision: clampNumber(options.agreementRevision, 0, 999, 0),
          previousAgreementMode: options.previousAgreementMode ? normalizeAgreementMode(options.previousAgreementMode) : null,
          previousMinimumAttendees: options.previousMinimumAttendees
            ? normalizeMinimumAttendees(options.previousMinimumAttendees, expectedCount)
            : null,
          agreementChangedAt: options.agreementChangedAt || null,
          status: options.status || "collecting",
          selectedCandidateId: options.selectedCandidateId || null,
          shareUrl: options.shareUrl || "",
          inviteSlug: options.inviteSlug || options.id || "",
          isSharedLink: Boolean(options.isSharedLink),
          createdAt: options.createdAt || new Date().toISOString(),
          closedAt: options.closedAt || null,
        };
        if (!room.shareUrl && !room.isSharedLink) room.shareUrl = buildGeneralShareUrl(room);
        return refreshRoomStatus(room);
      }

      function getDraftPreferences(room) {
        const draft = { ...(appState?.draftPreferences || {}) };
        room.candidates.forEach((candidate) => {
          if (!draft[candidate.id]) draft[candidate.id] = "available";
        });
        return draft;
      }

      function summarizeCandidate(room, candidate, order) {
        const counts = { prefer: 0, available: 0, adjustable: 0, hardNo: 0 };
        room.responses.forEach((response) => {
          const status = normalizeStatus(response.preferences[candidate.id]);
          counts[status] += 1;
        });
        const mode = normalizeAgreementMode(room.agreementMode);
        const minimum = agreementMinimum(room);
        const answered = Object.values(counts).reduce((sum, value) => sum + value, 0);
        const score =
          counts.prefer * statusMeta.prefer.score +
          counts.available * statusMeta.available.score +
          counts.adjustable * statusMeta.adjustable.score +
          counts.hardNo * statusMeta.hardNo.score;
        const hardNoRatio = answered > 0 ? counts.hardNo / answered : 0;
        const positiveCount = counts.prefer + counts.available;
        const flexibleCount = positiveCount + counts.adjustable;
        const hardBlocked = mode === "all_together" && counts.hardNo > 0;
        const meetsMinimum = mode === "all_together" ? !hardBlocked && flexibleCount >= answered : positiveCount >= minimum;
        const excluded = hardBlocked;
        return {
          candidate,
          order,
          counts,
          answered,
          score,
          hardNoCount: counts.hardNo,
          hardNoRatio,
          preferCount: counts.prefer,
          positiveCount,
          flexibleCount,
          meetsMinimum,
          excluded,
          eligible: meetsMinimum && !excluded,
        };
      }

      function rankCandidates(room) {
        const responseCount = room.responses.length;
        const agreementMode = normalizeAgreementMode(room.agreementMode);
        const minimum = requiredResponsesForAgreement(room);
        const minimumAttendees = agreementMinimum(room);
        const enough = responseCount >= minimum;
        const items = room.candidates
          .map((candidate, index) => summarizeCandidate(room, candidate, index))
          .sort((a, b) => {
            if (a.eligible !== b.eligible) return Number(b.eligible) - Number(a.eligible);
            if (a.excluded !== b.excluded) return Number(a.excluded) - Number(b.excluded);
            if (agreementMode === "fast_decision" && a.eligible && b.eligible) {
              const timeCompare = String(a.candidate.starts_at || "").localeCompare(String(b.candidate.starts_at || ""));
              if (timeCompare !== 0) return timeCompare;
            }
            if (a.score !== b.score) return b.score - a.score;
            if (a.preferCount !== b.preferCount) return b.preferCount - a.preferCount;
            if (a.positiveCount !== b.positiveCount) return b.positiveCount - a.positiveCount;
            if (a.counts.adjustable !== b.counts.adjustable) return a.counts.adjustable - b.counts.adjustable;
            if (a.candidate.starts_at !== b.candidate.starts_at) return String(a.candidate.starts_at || "").localeCompare(String(b.candidate.starts_at || ""));
            return a.order - b.order;
          });
        const eligible = items.filter((item) => item.eligible);
        const top = enough ? eligible[0] || null : null;
        const second = top ? eligible.find((item) => item.candidate.id !== top.candidate.id) : null;
        const scoreGap = top && second ? top.score - second.score : top ? Math.max(0, top.score) : 0;
        let confidence = "none";
        if (top) {
          const responseRate = room.expectedCount > 0 ? responseCount / room.expectedCount : 0;
          if (responseRate >= 0.8 && top.hardNoCount === 0 && scoreGap >= 3) confidence = "high";
          else if (responseRate >= 0.6) confidence = "medium";
          else confidence = "low";
        }
        const confidenceLabel = {
          high: locale.ui.confidenceHigh,
          medium: locale.ui.confidenceMedium,
          low: locale.ui.confidenceLow,
          none: locale.ui.confidenceNone,
        }[confidence];
        return {
          responseCount,
          minimum,
          minimumAttendees,
          agreementMode,
          enough,
          items,
          top,
          alternatives: eligible.filter((item) => item.candidate.id !== top?.candidate.id).slice(0, 2),
          confidence,
          confidenceLabel,
          scoreGap,
        };
      }

      function refreshRoomStatus(room) {
        if (room.status === "draft" || room.status === "closed" || room.status === "expired") return room;
        const ranked = rankCandidates(room);
        if (ranked.top) room.status = "recommended";
        else if (ranked.enough) room.status = "needs_new_options";
        else if (room.responses.length > 0) room.status = "low_confidence";
        else room.status = "collecting";
        return room;
      }

      function buildInviteText(room) {
        const shareUrl = room.shareUrl || buildGeneralShareUrl(room);
        return formatTemplate(locale.ui.inviteText, {
          title: room.title,
          url: shareUrl,
        });
      }

      function buildRecommendationText(room, ranked = rankCandidates(room)) {
        if (!ranked.top) {
          if (ranked.enough) {
            return formatTemplate(locale.ui.recommendationBlocked, { title: room.title });
          }
          const need = Math.max(0, ranked.minimum - ranked.responseCount);
          return formatTemplate(locale.ui.recommendationWait, { need, title: room.title });
        }
        const top = ranked.top;
        const candidate = top.candidate;
        return formatTemplate(locale.ui.recommendationText, {
          title: room.title,
          label: candidate.label,
          time: candidate.time,
          reason: recommendationReason(room, ranked),
          responses: ranked.responseCount,
          prefer: top.counts.prefer,
        });
      }

      function recommendationReason(room, ranked = rankCandidates(room)) {
        if (!ranked.top) return buildRecommendationText(room, ranked);
        const top = ranked.top;
        if (top.counts.hardNo === 0 && top.counts.adjustable === 0) return locale.ui.reasonConsensus;
        if (top.counts.hardNo === 0) return locale.ui.reasonAdjustment;
        return locale.ui.reasonFallback;
      }

      function buildReminderText(room, ranked = rankCandidates(room)) {
        const need = Math.max(0, ranked.minimum - ranked.responseCount);
        if (need === 0) {
          return formatTemplate(locale.ui.reminderReadyText, { title: room.title });
        }
        return formatTemplate(locale.ui.reminderText, {
          title: room.title,
          need,
          deadline: room.deadlineLabel,
        });
      }

      function buildConfirmedText(room, ranked = rankCandidates(room)) {
        const selected =
          room.candidates.find((candidate) => candidate.id === room.selectedCandidateId) ||
          ranked.top?.candidate ||
          room.candidates[0];
        return formatTemplate(locale.ui.confirmedText, {
          title: room.title,
          label: selected.label,
          time: selected.time,
          note: selected.note,
        });
      }

      function buildCopyTextForAction(room, action, ranked = rankCandidates(room)) {
        if (action === "copy-invite") return buildInviteText(room);
        if (action === "copy-reminder") return buildReminderText(room, ranked);
        if (room.status === "closed") return buildConfirmedText(room, ranked);
        return buildRecommendationText(room, ranked);
      }

      function buildShareText(room, ranked = rankCandidates(room)) {
        return buildRecommendationText(room, ranked);
      }

      function sampleResponsesFor(room) {
        const [first, second, third] = room.candidates;
        return [
          {
            alias: "서연",
            preferences: { [first.id]: "available", [second.id]: "prefer", [third.id]: "hardNo" },
          },
          {
            alias: "지훈",
            preferences: { [first.id]: "prefer", [second.id]: "adjustable", [third.id]: "hardNo" },
          },
          {
            alias: "하린",
            preferences: { [first.id]: "available", [second.id]: "adjustable", [third.id]: "available" },
          },
          {
            alias: "도윤",
            preferences: { [first.id]: "prefer", [second.id]: "available", [third.id]: "available" },
          },
          {
            alias: "민재",
            preferences: { [first.id]: "available", [second.id]: "prefer", [third.id]: "available" },
          },
        ].map(normalizeResponse);
      }

      function createDefaultState() {
        return createFreshState();
      }

      function createDemoState() {
        const fixture = localizedDemoFixture();
        const room = createDemoRoom({
          candidates: fixture.candidates,
          responses: sampleResponsesFor({ candidates: fixture.candidates }).slice(0, 5),
        });
        return {
          version: APP_VERSION,
          room,
          hostRooms: [room],
          hostDraft: null,
          editingRoomId: null,
          inviteContext: null,
          revokedRoomIds: [],
          draftPreferences: {},
          currentParticipant: "",
          currentParticipantId: "",
          copyStatus: "",
          hostFormError: "",
          responseError: "",
          openCalendarIndex: null,
          customExpectedCountOpen: false,
          customExpectedCountValue: "",
          lastSubmittedAt: null,
          lastResponseId: null,
          showResponseInbox: false,
          agreementSheetOpen: false,
          pendingAgreementMode: "",
          pendingMinimumAttendees: "",
          openChoicePopover: "",
          openDeadlineCalendar: false,
        };
      }

      function createFreshState() {
        return {
          version: APP_VERSION,
          room: null,
          hostRooms: [],
          hostDraft: null,
          editingRoomId: null,
          inviteContext: null,
          revokedRoomIds: [],
          draftPreferences: {},
          currentParticipant: "",
          currentParticipantId: "",
          copyStatus: "",
          hostFormError: "",
          responseError: "",
          openCalendarIndex: null,
          customExpectedCountOpen: false,
          customExpectedCountValue: "",
          lastSubmittedAt: null,
          lastResponseId: null,
          showResponseInbox: false,
          agreementSheetOpen: false,
          pendingAgreementMode: "",
          pendingMinimumAttendees: "",
          openChoicePopover: "",
          openDeadlineCalendar: false,
        };
      }

      function createDraftRoom() {
        return createDemoRoom({
          id: `draft-${Date.now().toString(36)}`,
          responses: [],
          candidates: localizedDefaultCandidates().slice(0, 3),
          status: "draft",
        });
      }

      function hasSavedRoom() {
        return Boolean(appState.room);
      }

      function roomOrDraft() {
        if (appState.hostDraft) return createDemoRoom(appState.hostDraft);
        return appState.room || createDraftRoom();
      }

      function normalizeState(raw) {
        if (!raw || raw.version !== APP_VERSION) return createDefaultState();
        const room = raw.room ? createDemoRoom(raw.room) : null;
        if (room) {
          room.status = raw.room.status || room.status;
          room.selectedCandidateId = raw.room.selectedCandidateId || room.selectedCandidateId;
          room.closedAt = raw.room.closedAt || room.closedAt;
        }
        const hostRooms = Array.isArray(raw.hostRooms)
          ? raw.hostRooms.map((savedRoom) => createDemoRoom(savedRoom))
          : room && !room.isSharedLink
            ? [room]
            : [];
        return {
          version: APP_VERSION,
          room,
          hostRooms,
          hostDraft: raw.hostDraft ? createDemoRoom(raw.hostDraft) : null,
          editingRoomId: raw.editingRoomId || null,
          inviteContext: raw.inviteContext || null,
          revokedRoomIds: Array.isArray(raw.revokedRoomIds) ? raw.revokedRoomIds : [],
          draftPreferences: raw.draftPreferences || {},
          currentParticipant: raw.currentParticipant || "",
          currentParticipantId: raw.currentParticipantId || "",
          copyStatus: raw.copyStatus || "",
          hostFormError: raw.hostFormError || "",
          responseError: raw.responseError || "",
          openCalendarIndex: raw.openCalendarIndex ?? null,
          customExpectedCountOpen: Boolean(raw.customExpectedCountOpen),
          customExpectedCountValue: String(raw.customExpectedCountValue || ""),
          lastSubmittedAt: raw.lastSubmittedAt || null,
          lastResponseId: raw.lastResponseId || null,
          showResponseInbox: Boolean(raw.showResponseInbox),
          agreementSheetOpen: Boolean(raw.agreementSheetOpen),
          pendingAgreementMode: raw.pendingAgreementMode || "",
          pendingMinimumAttendees: raw.pendingMinimumAttendees || "",
          openChoicePopover: raw.openChoicePopover || "",
          openDeadlineCalendar: Boolean(raw.openDeadlineCalendar),
        };
      }

      function loadState() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("reset") === "1") localStorage.removeItem(currentStorageKey());
        let storedState = null;
        try {
          const stored = localStorage.getItem(currentStorageKey());
          if (stored) storedState = normalizeState(JSON.parse(stored));
        } catch {
          storedState = null;
        }
        const shareSnapshot = fromBase64Url(params.get("join"));
        const sharedRoom = publicRoomFromShareSnapshot(shareSnapshot);
        const revokedRoomIds = storedState?.revokedRoomIds || [];
        if (shareSnapshot?.id && revokedRoomIds.includes(shareSnapshot.id)) {
          const expiredRoom = sharedRoom || createDemoRoom({ id: shareSnapshot.id, status: "expired", isSharedLink: true });
          expiredRoom.status = "expired";
          return {
            ...createFreshState(),
            room: expiredRoom,
            inviteContext: { status: "deleted", roomId: shareSnapshot.id },
            revokedRoomIds,
            showResponseInbox: false,
          };
        }
        if (sharedRoom) {
          const participantParam = params.get("participant") || "";
          const linkedParticipant = namedParticipants(sharedRoom).find((participant) => participant.id === participantParam);
          return {
            ...createFreshState(),
            room: sharedRoom,
            inviteContext: { status: "valid", roomId: sharedRoom.id },
            revokedRoomIds,
            draftPreferences: {},
            currentParticipant: linkedParticipant?.name || "",
            currentParticipantId: linkedParticipant?.id || "",
            showResponseInbox: false,
          };
        }
        if (storedState) return storedState;
        return isDemoMode() ? createDemoState() : createDefaultState();
      }

      function saveState() {
        localStorage.setItem(currentStorageKey(), JSON.stringify(appState));
      }

      activeLocale = getInitialLocale();
      applyLocale(activeLocale);

      let appState = loadState();

      function applyRouteState(screen) {
        let changed = false;
        if (appState.inviteContext?.status === "deleted") return "scr-05-link-expired";
        const roomRequiredScreens = [
          "scr-03-result-recommendation",
          "scr-04-insufficient-response",
          "scr-06-room-closed",
        ];
        if (!appState.room && roomRequiredScreens.includes(screen)) return "scr-00-entry";
        if (screen === "scr-05-link-expired" && appState.room && isDemoMode() && appState.room.status !== "expired") {
          appState.room.status = "expired";
          changed = true;
        }
        if (screen === "scr-02b-response-complete" && !isDemoMode() && !appState.lastSubmittedAt) {
          return appState.room ? "scr-02-participant-input" : "scr-00-entry";
        }
        if (screen === "scr-06-room-closed" && appState.room.status !== "closed") {
          if (!isDemoMode()) {
            return appState.room.status === "recommended" ? "scr-03-result-recommendation" : "scr-00-entry";
          }
          const ranked = rankCandidates(appState.room);
          appState.room.selectedCandidateId = appState.room.selectedCandidateId || ranked.top?.candidate.id || appState.room.candidates[0].id;
          appState.room.status = "closed";
          appState.room.closedAt = appState.room.closedAt || new Date().toISOString();
          changed = true;
        }
        if (changed) saveState();
        return screen;
      }

      function responseModeFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get("response") === "inbox" ? "inbox" : "detail";
      }

      function performClearLocalData() {
        localStorage.removeItem(currentStorageKey());
        appState = createFreshState();
        appState.copyStatus = "";
        hasUnsavedEdits = false;
        selectScreen("scr-00-entry");
      }

      function clearLocalData() {
        requestConfirmation({ kind: "clear-local-data" });
      }

      function shouldConfirmNavigation(action) {
        if (!hasUnsavedEdits) return false;
        if (!["go-home", "open-settings", "open-existing-room", "open-host-dashboard", "start-create-room", "respond-to-invite", "open-participation-tab", "history"].includes(action)) return false;
        return ["scr-01-host-room", "scr-02-participant-input"].includes(renderedScreen);
      }

      function renderConfirmModal() {
        if (!pendingConfirmation) {
          confirmModalRoot.innerHTML = "";
          return;
        }
        const isDelete = pendingConfirmation.kind === "delete-room";
        const isClearData = pendingConfirmation.kind === "clear-local-data";
        const title = isDelete
          ? locale.ui.deleteRoom
          : isClearData
            ? locale.ui.clearDataConfirmTitle
            : locale.ui.unsavedExitTitle;
        const body = isDelete
          ? locale.ui.deleteRoomConfirm
          : isClearData
            ? locale.ui.clearDataConfirmBody
            : locale.ui.unsavedExitBody;
        const confirmLabel = isDelete
          ? locale.ui.confirmDelete
          : isClearData
            ? locale.ui.confirmClearData
            : locale.ui.confirmProceed;
        const cancelLabel = locale.ui.confirmCancel;
        confirmModalRoot.innerHTML = `
          <div class="ConfirmDialog" role="presentation">
            <section class="ConfirmDialogPanel" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title" data-testid="custom-confirm-modal">
              <div class="section">
                <h2 id="confirm-modal-title">${escapeHtml(title)}</h2>
                <p>${escapeHtml(body)}</p>
              </div>
              <div class="buttonRow two">
                <button class="quietButton Button3D" type="button" data-action="confirm-modal-cancel" data-testid="confirm-modal-cancel">${escapeHtml(cancelLabel)}</button>
                <button class="${isDelete || isClearData ? "secondaryButton" : "primaryButton"} Button3D" type="button" data-action="confirm-modal-confirm" data-testid="confirm-modal-confirm">${escapeHtml(confirmLabel)}</button>
              </div>
            </section>
          </div>
        `;
      }

      function requestConfirmation(config) {
        pendingConfirmation = config;
        renderConfirmModal();
        return false;
      }

      function closeConfirmation() {
        pendingConfirmation = null;
        renderConfirmModal();
      }

      function confirmNavigationIfDirty(action, target = null) {
        if (!shouldConfirmNavigation(action)) return true;
        return requestConfirmation({
          kind: "unsaved-navigation",
          action,
          targetAction: target?.dataset?.action || "",
          targetData: target?.dataset ? { ...target.dataset } : {},
        });
      }

      function applyPendingConfirmation() {
        const confirmation = pendingConfirmation;
        closeConfirmation();
        if (!confirmation) return;
        if (confirmation.kind === "delete-room") {
          performDeleteHostedRoom(confirmation.roomId);
          return;
        }
        if (confirmation.kind === "clear-local-data") {
          performClearLocalData();
          return;
        }
        if (confirmation.kind === "history") {
          hasUnsavedEdits = false;
          const nextRoute = confirmation.nextRoute || routeStateFor(confirmation.nextScreen, { responseMode: confirmation.nextResponseMode });
          const nextUrl = buildScreenUrl(nextRoute.screen, { responseMode: nextRoute.responseMode });
          if (appRouteStack.length > 1) appRouteStack.pop();
          else rememberRoute(nextRoute, true);
          window.history.replaceState(nextRoute, "", nextUrl);
          render(nextRoute.screen);
          return;
        }
        if (confirmation.kind === "unsaved-navigation") {
          hasUnsavedEdits = false;
          handleAction(confirmation.action, { dataset: confirmation.targetData || { action: confirmation.targetAction || confirmation.action }, disabled: false });
        }
      }

      function nextAnonymousAlias(room, editingResponseId = null) {
        const base = locale.ui.anonymousAlias;
        const existingAliases = new Set(
          room.responses
            .filter((response) => response.id !== editingResponseId)
            .map((response) => response.alias),
        );
        if (!existingAliases.has(base)) return base;
        let suffix = 2;
        while (existingAliases.has(`${base} ${suffix}`)) suffix += 1;
        return `${base} ${suffix}`;
      }

      function reasonChip(kind, label) {
        const mark = kind === "success" ? "✓" : kind === "warning" ? "!" : kind === "danger" ? "−" : "•";
        return `<span class="ReasonChip ${kind}"><span aria-hidden="true">${mark}</span>${escapeHtml(label)}</span>`;
      }

      function stateGraphic(variant, label) {
        const graphicMap = {
          closed: "assets/final/states/state_confirmed_object.png",
          expired: "assets/final/states/state_expired_link_object.png",
          low: "assets/final/states/state_insufficient_response_object.png",
          negotiating: "assets/final/states/state_private_negotiation_object.png",
        };
        const src = graphicMap[variant] || graphicMap.low;
        return `
          <div class="StateGraphic" data-variant="${variant}" role="img" aria-label="${escapeHtml(label)}">
            <img class="StateGraphicImage" src="${src}" alt="" aria-hidden="true" />
          </div>
        `;
      }

      function preferenceSelector(candidate, selected, disabled = false) {
        const candidateId = candidate.id;
        const candidateLabel = `${candidate.label} ${candidate.time}`;
        return `
          <div class="PreferenceSelector" role="group" aria-label="${escapeHtml(formatTemplate(locale.ui.preferenceGroupLabel, { candidate: candidateLabel }))}">
            ${Object.entries(locale.status)
              .map(([key, label]) => {
                const meta = statusMeta[key];
                const pressed = selected === key;
                return `<button class="preferenceOption" type="button" data-action="set-preference" data-candidate-id="${escapeHtml(candidateId)}" data-status="${key}" data-testid="preference-${escapeHtml(candidateId)}-${key}" data-selected="${pressed}" aria-pressed="${pressed}" aria-label="${escapeHtml(formatTemplate(locale.ui.preferenceButtonLabel, { candidate: candidateLabel, status: label }))}" ${disabled ? "disabled" : ""}>
                  <span aria-hidden="true">${meta.icon}</span><span>${label}</span>
                </button>`;
              })
              .join("")}
          </div>
        `;
      }

      function consensusStateForCandidate(item, ranked) {
        if (!ranked.enough) {
          return { key: "moreNeeded", className: "warning", label: locale.ui.moreNeededLabel, body: locale.ui.moreNeededBody };
        }
        if (item.counts.hardNo >= 2) {
          return { key: "burden", className: "warning", label: locale.ui.burdenLabel, body: locale.ui.burdenBody };
        }
        if (item.counts.hardNo === 0 && item.counts.adjustable === 0 && item.flexibleCount >= ranked.responseCount) {
          return { key: "allPossible", className: "success", label: locale.ui.allPossibleLabel, body: locale.ui.allPossibleBody };
        }
        if (item.counts.hardNo === 0 && item.counts.adjustable === 1) {
          return { key: "needsCheck", className: "warning", label: locale.ui.needsCheckLabel, body: locale.ui.needsCheckBody };
        }
        if (ranked.top?.candidate.id === item.candidate.id) {
          const second = ranked.items.find((candidateItem) => candidateItem.eligible && candidateItem.candidate.id !== item.candidate.id);
          if (second && ranked.scoreGap <= 1) {
            return { key: "similar", className: "brand", label: locale.ui.similarLabel, body: locale.ui.similarBody };
          }
          return { key: "leading", className: "brand", label: locale.ui.leadingCandidateLabel, body: locale.ui.leadingCandidateBody };
        }
        return { key: "moreNeeded", className: "brand", label: locale.ui.similarLabel, body: locale.ui.similarBody };
      }

      function aggregateLine(item) {
        return formatTemplate(locale.ui.aggregateSummary, {
          prefer: item.counts.prefer,
          available: item.counts.available,
          adjustable: item.counts.adjustable,
          hardNo: item.counts.hardNo,
        });
      }

      function canSeeAnonymousAggregate(room) {
        return Boolean(room && (!room.isSharedLink || appState.lastSubmittedAt || room.status === "closed"));
      }

      function agreementChangeNotice(room) {
        if (!room?.agreementChangedAt || !room.previousAgreementMode) return "";
        return `
          <section class="AgreementNotice" data-testid="agreement-change-notice">
            ${reasonChip("brand", "기준 변경")}
            <p class="helperText">${escapeHtml(formatTemplate(locale.ui.agreementChangedNotice, {
              previous: agreementLabel(room.previousAgreementMode),
              current: agreementLabel(room.agreementMode),
            }))}</p>
          </section>
        `;
      }

      function anonymousAggregatePanel(room, options = {}) {
        if (!canSeeAnonymousAggregate(room) && !options.force) return "";
        const ranked = rankCandidates(room);
        const items = options.limit ? ranked.items.slice(0, options.limit) : ranked.items;
        return `
          <section class="AnonymousAggregatePanel" data-testid="anonymous-aggregate-panel" aria-label="${escapeHtml(locale.ui.anonymousAggregateTitle)}">
            <div class="topline">
              <div class="slotMeta">
                <strong>${escapeHtml(locale.ui.anonymousAggregateTitle)}</strong>
                <span>${escapeHtml(locale.ui.anonymousAggregateBody)}</span>
              </div>
              ${reasonChip(agreementModes[ranked.agreementMode].className, agreementLabel(ranked.agreementMode))}
            </div>
            <div class="AnonymousAggregateList">
              ${items
                .map((item, index) => {
                  const state = consensusStateForCandidate(item, ranked);
                  return `<article class="AnonymousAggregateCard" data-testid="anonymous-aggregate-card-${index}">
                    <div class="topline">
                      <div class="slotMeta">
                        <strong>${escapeHtml(item.candidate.label)} ${escapeHtml(item.candidate.time)}</strong>
                        <span>${escapeHtml(item.candidate.note)}</span>
                      </div>
                      ${reasonChip(state.className, state.label)}
                    </div>
                    <p class="caption">${escapeHtml(aggregateLine(item))}</p>
                    <p class="helperText">${escapeHtml(state.body)}</p>
                  </article>`;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function candidateSlotCard(slot, options = {}) {
        const selectedStatus = normalizeStatus(options.selectedStatus || "available");
        const summary = options.summary;
        const selected = Boolean(options.selected);
        const disabled = Boolean(options.disabled);
        let chip = reasonChip(statusMeta[selectedStatus].className, locale.status[selectedStatus]);
        if (summary) {
          const ranked = options.ranked || { enough: true, top: selected ? summary : null, items: [summary], scoreGap: 0, agreementMode: "all_together", responseCount: summary.answered };
          const state = consensusStateForCandidate(summary, ranked);
          if (summary.excluded) chip = reasonChip("danger", locale.ui.candidateExcluded);
          else if (selected) chip = reasonChip(state.className, state.label);
          else chip = reasonChip(state.className, state.label);
        }
        return `
          <article class="CandidateSlotCard" data-selected="${selected}" data-disabled="${disabled}">
            <div class="topline">
              <div class="slotMeta">
                <strong>${escapeHtml(slot.label)} ${escapeHtml(slot.time)}</strong>
                <span>${escapeHtml(slot.note)}</span>
              </div>
              ${chip}
            </div>
            ${summary ? `<p class="caption">${escapeHtml(aggregateLine(summary))}</p>` : ""}
            ${options.withSelector ? preferenceSelector(slot, selectedStatus, disabled) : ""}
          </article>
        `;
      }

      function responseProgressLabel(room) {
        const ranked = rankCandidates(room);
        return `${ranked.responseCount}/${room.expectedCount}`;
      }

      function responseProgressText(room) {
        return formatTemplate(locale.ui.responseProgressText, { progress: responseProgressLabel(room) });
      }

      function responseInboxCandidateMeta(room) {
        const firstCandidate = room?.candidates?.[0] || {};
        return formatTemplate(locale.ui.responseInboxCandidateMeta, {
          label: firstCandidate.label || "",
          time: firstCandidate.time || "",
          count: Math.max(0, (room?.candidates?.length || 0) - 1),
        });
      }

      function responseCoverage(room, state = "enough") {
        const ranked = rankCandidates(room);
        const percent = Math.min(100, Math.round((ranked.responseCount / room.expectedCount) * 100));
        const need = Math.max(0, ranked.minimum - ranked.responseCount);
        const label = state === "blocked"
          ? `${room.expectedCount}명 중 ${ranked.responseCount}명이 답했지만, 현재 기준에 맞는 후보가 없어요.`
          : state === "low"
            ? `${room.expectedCount}명 중 ${ranked.responseCount}명이 답했어요. ${need}명만 더 답하면 추천을 시작해요.`
            : `${room.expectedCount}명 중 ${ranked.responseCount}명이 답했어요.`;
        const chipLabel = state === "blocked" ? "새 후보 필요" : state === "low" ? locale.coverageLabel.collecting : locale.coverageLabel.enough;
        return `
          <section class="ResponseCoverage" aria-label="응답률">
            <div class="topline">
              <h3>응답 현황</h3>
              <span class="progressPill">${escapeHtml(responseProgressText(room))}</span>
              ${reasonChip(state === "blocked" ? "danger" : state === "low" ? "warning" : "success", chipLabel)}
            </div>
            <div class="coverageTrack" aria-hidden="true"><div class="coverageFill" style="width: ${percent}%"></div></div>
            <p class="caption">${label}</p>
          </section>
        `;
      }

      function responseInbox(room) {
        if (!room) {
          return `
            <section class="ResponseInbox" data-testid="response-inbox-list" aria-labelledby="response-empty-title">
              <section class="ResponseEmptyState" data-testid="response-empty-state">
                ${reasonChip("brand", locale.ui.responseInboxLabel)}
                <h2 id="response-empty-title">${escapeHtml(locale.ui.responseEmptyTitle)}</h2>
                <p class="helperText">${escapeHtml(locale.ui.responseEmptyBody)}</p>
              </section>
              <section class="surface compactSection" aria-label="${escapeHtml(locale.ui.sentRoomLabel)}">
                ${reasonChip("success", locale.ui.sentRoomLabel)}
                <p class="helperText">${escapeHtml(locale.ui.responseEmptySentHint)}</p>
              </section>
            </section>
          `;
        }
        const statusLabel = room.status === "closed"
          ? locale.ui.responseInboxStatusClosed
          : appState.lastSubmittedAt
            ? locale.ui.responseInboxSubmitted
            : locale.ui.responseInboxStatusPending;
        return `
          <section class="ResponseInbox" data-testid="response-inbox-list" aria-labelledby="response-inbox-title">
            <div class="section">
              <span class="eyebrow">${escapeHtml(locale.ui.responseInboxLabel)}</span>
              <h1 id="response-inbox-title">${escapeHtml(locale.ui.responseInboxTitle)}</h1>
              <p>${escapeHtml(locale.ui.responseInboxBody)}</p>
            </div>
            <button class="ResponseInboxCard Button3D" type="button" data-action="open-response-room" data-testid="response-inbox-open-0">
              <div class="topline">
                <strong>${escapeHtml(room.title)}</strong>
                ${reasonChip(appState.lastSubmittedAt ? "success" : "brand", statusLabel)}
              </div>
              <span class="progressPill">${escapeHtml(responseProgressText(room))}</span>
              <span class="helperText">${escapeHtml(responseInboxCandidateMeta(room))}</span>
            </button>
            <section class="surface compactSection" aria-label="${escapeHtml(locale.ui.sentRoomLabel)}">
              ${reasonChip("success", locale.ui.sentRoomLabel)}
              <p class="helperText">${escapeHtml(locale.ui.sentRoomHint)}</p>
            </section>
          </section>
        `;
      }

      function homeHeroStatusOverlay({ stats, hostedCount, candidateCount, savedRoomLine }) {
        const answeredLabel = stats ? `${stats.answered}/${stats.expected}` : "0/0";
        const missingLabel = stats ? `${stats.missing}명` : `${hostedCount}개`;
        const missingTitle = stats ? "미응답" : "내 모임";
        return `
          <div class="HomeHeroStatusOverlay" data-testid="home-status-overlay" aria-label="${escapeHtml(locale.ui.currentStatus)}">
            <div class="HeroStatusPill" data-testid="hero-status-pill">
              <span>${escapeHtml(locale.ui.currentStatus)}</span>
              <strong>${escapeHtml(locale.ui.progressStatus)}</strong>
            </div>
            <div class="HeroStatusMetrics" aria-label="현재 모임 상태">
              <div class="HomeMetricCard"><strong>${escapeHtml(answeredLabel)}</strong><span>응답</span></div>
              <div class="HomeMetricCard"><strong>${escapeHtml(missingLabel)}</strong><span>${escapeHtml(missingTitle)}</span></div>
              <div class="HomeMetricCard"><strong>${escapeHtml(candidateCount)}</strong><span>후보</span></div>
            </div>
            <p class="emptyStateLine">${escapeHtml(savedRoomLine)}</p>
          </div>
        `;
      }

      function avatarStack(count = 5) {
        const tokens = Array.from({ length: Math.min(count, 8) }, (_, index) => {
          const type = index % 3 === 0 ? "success" : index % 3 === 1 ? "warning" : "";
          return `<span class="avatarToken ${type}" aria-hidden="true">${index + 1}</span>`;
        }).join("");
        return `<div class="ParticipantAvatarStack" aria-label="${count}명 응답 집계">${tokens}${count > 8 ? '<span class="avatarToken">+ </span>' : ""}</div>`;
      }

      function shareCopyBox(room, ranked) {
        const label = room.status === "closed" ? "확정 문구" : locale.shareLabel.template;
        const copy = room.status === "closed" ? buildConfirmedText(room, ranked) : buildRecommendationText(room, ranked);
        return `
          <section class="ShareCopyBox" aria-label="공유 문구">
            ${reasonChip(room.status === "closed" ? "success" : "success", label)}
            <p class="copyText">${escapeHtml(copy)}</p>
            <p class="helperText">${escapeHtml(locale.ui.kakaoPasteHint)}</p>
            ${appState.copyStatus ? `<p class="actionStatus" data-testid="copy-status">${escapeHtml(appState.copyStatus)}</p>` : ""}
          </section>
        `;
      }

      function generalShareLinkBox(room) {
        const shareUrl = room.shareUrl || buildGeneralShareUrl(room);
        return `
          <section class="linkField" aria-label="${escapeHtml(locale.ui.generalShareLink)}">
            <div class="slotMeta">
              <strong>${escapeHtml(locale.ui.generalShareLink)}</strong>
              <span>비밀 투표 링크가 준비됐어요.</span>
            </div>
            <p class="helperText">${escapeHtml(locale.ui.generalShareHint)}</p>
            <input class="textInput compactLinkInput" data-testid="general-share-link" value="${escapeHtml(shareUrl)}" readonly />
            ${individualParticipantLinks(room)}
          </section>
        `;
      }

      function individualParticipantLinks(room) {
        const roster = namedParticipants(room);
        if (!roster.length) return "";
        return `
          <details class="IndividualLinks" data-testid="individual-links-panel">
            <summary>개인별 링크</summary>
            <div class="IndividualLinkList">
              ${roster
                .map((participant, index) => {
                  const url = buildParticipantShareUrl(room, participant);
                  return `<div class="IndividualLinkRow">
                    <span>${escapeHtml(participant.name)}</span>
                    <input class="textInput compactLinkInput" data-testid="participant-share-link-${index}" value="${escapeHtml(url)}" readonly />
                    <button class="candidateActionButton" type="button" data-action="copy-participant-link" data-room-id="${escapeHtml(room.id)}" data-participant-id="${escapeHtml(participant.id)}" data-testid="copy-participant-link-${index}">복사</button>
                  </div>`;
                })
                .join("")}
            </div>
          </details>
        `;
      }

      function incomingInviteCard(room) {
        if (!room || !room.isSharedLink) return "";
        return `
          <section class="surface IncomingInviteCard" data-testid="invite-context-card" aria-label="${escapeHtml(locale.ui.incomingInviteTitle)}">
            ${reasonChip("success", locale.ui.incomingInviteTitle)}
            <div class="slotMeta">
              <strong>${escapeHtml(room.title)}</strong>
              <span>${escapeHtml(formatTemplate(locale.ui.incomingInviteMeta, { count: room.candidates.length, expected: room.expectedCount }))}</span>
            </div>
            <p class="helperText">${escapeHtml(formatTemplate(locale.ui.incomingInviteBody, { title: room.title }))}</p>
            <button class="candidateActionButton Button3D inviteResponseButton" type="button" data-action="respond-to-invite" data-testid="respond-to-invite-button">${escapeHtml(locale.ui.respondToInvite)}</button>
          </section>
        `;
      }

      function unansweredParticipantsLine(stats) {
        if (!stats?.missingParticipants?.length) return "모두 응답했어요";
        return stats.missingParticipants.map((participant) => participant.name).join(", ");
      }

      function hostMiniAggregate(room, ranked = rankCandidates(room)) {
        const top = ranked.top || ranked.items[0];
        if (!top) return "";
        const state = consensusStateForCandidate(top, ranked);
        return `
          <div class="HostAggregateMini" data-testid="host-anonymous-aggregate">
            ${reasonChip(state.className, state.label)}
            <span>${escapeHtml(top.candidate.label)} ${escapeHtml(top.candidate.time)} · ${escapeHtml(aggregateLine(top))}</span>
          </div>
        `;
      }

      function hostStatusCard(room, index) {
        const ranked = rankCandidates(room);
        const stats = participantStats(room);
        const statusLabel = room.status === "closed"
          ? screenCopy("scr-06-room-closed").eyebrow
          : ranked.top
            ? screenCopy("scr-03-result-recommendation").eyebrow
            : screenCopy("scr-04-insufficient-response").eyebrow;
        return `
          <article class="HostStatusCard">
            <div class="slotMeta">
              <strong>${escapeHtml(room.title)}</strong>
              <span>${escapeHtml(formatTemplate(locale.ui.responseCount, { count: ranked.responseCount }))} · ${escapeHtml(statusLabel)}</span>
            </div>
            <div class="HostStatusMetrics" aria-label="모임 요약">
              <div class="HostMetricPill"><strong>${stats.answered}/${stats.expected}</strong><span>응답</span></div>
              <div class="HostMetricPill"><strong>미응답 ${stats.missing}명</strong><span>남은 사람</span></div>
              <div class="HostMetricPill"><strong>${room.candidates.length}개</strong><span>후보</span></div>
            </div>
            <div class="HostUnansweredLine" data-testid="host-unanswered-list-${index}">
              ${reasonChip("brand", locale.ui.unansweredPeople)}
              <span>${escapeHtml(unansweredParticipantsLine(stats))}</span>
            </div>
            ${hostMiniAggregate(room, ranked)}
            <div class="HostCardActions" data-testid="host-card-actions-${index}">
              <button class="candidateActionButton" type="button" data-action="open-room-status" data-room-id="${escapeHtml(room.id)}" data-testid="open-room-status-${index}">상태</button>
              <button class="candidateActionButton" type="button" data-action="edit-host-room" data-room-id="${escapeHtml(room.id)}" data-testid="edit-host-room-${index}">수정</button>
              <button class="candidateActionButton" type="button" data-action="copy-room-link" data-room-id="${escapeHtml(room.id)}" data-testid="copy-room-link-${index}">공유</button>
              <button class="candidateActionButton dangerAction" type="button" data-action="delete-room" data-room-id="${escapeHtml(room.id)}" data-testid="delete-room-button-${index}">${escapeHtml(locale.ui.deleteRoomShort)}</button>
            </div>
            ${individualParticipantLinks(room)}
          </article>
        `;
      }

      function actionAttrs(action, testId) {
        return `${action ? `data-action="${escapeHtml(action)}"` : ""} ${testId ? `data-testid="${escapeHtml(testId)}"` : ""}`;
      }

      function stickyBottomCTA(primary, secondary, options = {}) {
        const disabled = options.disabled ? 'disabled aria-disabled="true"' : "";
        const secondaryDisabled = options.secondaryDisabled ? 'disabled aria-disabled="true"' : "";
        const secondaryButton = secondary
          ? `<button class="quietButton Button3D" type="button" ${secondaryDisabled} ${actionAttrs(options.secondaryAction, options.secondaryTestId)}>${escapeHtml(secondary)}</button>`
          : "";
        return `
          <div class="StickyBottomCTA">
            <div class="buttonRow ${secondary ? "two" : ""}">
              <button class="${options.secondaryPrimary ? "secondaryButton" : "primaryButton"} Button3D" type="button" ${disabled} ${actionAttrs(options.primaryAction, options.primaryTestId)}>${escapeHtml(primary)}</button>
              ${secondaryButton}
            </div>
          </div>
        `;
      }

      function standardHeader(id, titleId) {
        const copy = screenCopy(id);
        return `
          <div class="section">
            <span class="eyebrow">${escapeHtml(copy.eyebrow)}</span>
            <h1 id="${escapeHtml(titleId)}">${escapeHtml(copy.title)}</h1>
            <p>${escapeHtml(copy.description)}</p>
          </div>
        `;
      }

      function renderCandidateInputs(room) {
        const candidates = room.candidates.length
          ? room.candidates.slice(0, MAX_CANDIDATES)
          : localizedDefaultCandidates().slice(0, 3);
        return candidates
          .map((candidate, index) => `
            <div class="candidateInputCard HostRoomEditor">
              <div class="candidateInputHeader">
                ${reasonChip(index === 0 ? "brand" : "success", formatTemplate(locale.ui.candidateLabel, { index: index + 1 }))}
                <button class="candidateActionButton" type="button" data-action="remove-candidate" data-candidate-index="${index}" data-testid="remove-candidate-${index}" ${candidates.length <= 2 ? "disabled" : ""}>${escapeHtml(locale.ui.removeCandidate)}</button>
              </div>
              <div class="formGrid dateTimeGrid">
                <label class="inputGroup">
                  <span class="inputLabel">날짜</span>
                  ${renderReleaseDateControl(candidate, index)}
                </label>
                <label class="inputGroup">
                  <span class="inputLabel">시간</span>
                  ${renderReleaseTimeControl(candidate, index)}
                </label>
              </div>
              <label class="inputGroup">
                <span class="inputLabel">장소/메모</span>
                <input class="textInput" data-testid="candidate-note-input-${index}" name="candidate-note-${index}" value="${escapeHtml(candidate.note)}" />
              </label>
            </div>
          `)
          .join("") +
          `<button class="candidateActionButton" type="button" data-action="add-candidate" data-testid="add-candidate-button" ${candidates.length >= MAX_CANDIDATES ? "disabled" : ""}>${escapeHtml(locale.ui.addCandidate)}</button>`;
      }

      function renderCustomChoiceControl({ name, value, options, testPrefix, ariaLabel }) {
        const selected = options.find((option) => String(option.value) === String(value)) || options[0];
        const isOpen = appState.openChoicePopover === testPrefix;
        return `
          <div class="CustomChoiceControl" data-testid="${escapeHtml(testPrefix)}-control">
            <input type="hidden" name="${escapeHtml(name)}" value="${escapeHtml(selected.value)}" />
            <button class="CustomChoiceTrigger Button3D" type="button" data-action="toggle-choice-popover" data-choice="${escapeHtml(testPrefix)}" data-testid="${escapeHtml(testPrefix)}-trigger" aria-expanded="${isOpen}" aria-label="${escapeHtml(ariaLabel)}">
              <span>${escapeHtml(selected.label)}</span>
              <span class="CustomChoiceChevron" aria-hidden="true">⌄</span>
            </button>
            <div class="CustomChoicePopover" data-testid="${escapeHtml(testPrefix)}-popover" role="listbox" ${isOpen ? "" : "hidden"}>
              ${options
                .map((option) => {
                  const optionSelected = String(option.value) === String(selected.value);
                  return `<button class="CustomChoiceOption" type="button" role="option" aria-selected="${optionSelected}" data-selected="${optionSelected}" data-action="set-choice-value" data-choice="${escapeHtml(testPrefix)}" data-choice-name="${escapeHtml(name)}" data-choice-value="${escapeHtml(option.value)}" data-testid="${escapeHtml(testPrefix)}-option-${escapeHtml(option.value)}">
                    <span>${escapeHtml(option.label)}</span>
                    <span aria-hidden="true">${optionSelected ? "✓" : ""}</span>
                  </button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }

      function expectedCountChoices() {
        return [
          ...Array.from({ length: 8 }, (_, index) => {
            const count = index + 3;
            return { value: String(count), label: `${count}명` };
          }),
          { value: "custom", label: locale.ui.expectedDirectInput },
        ];
      }

      function renderExpectedCountControl(room) {
        const current = clampNumber(room.expectedCount, 3, 20, 7);
        const customOpen = appState.customExpectedCountOpen || current > 10;
        const customValue = appState.customExpectedCountValue || String(clampNumber(room.expectedCount, 3, 20, 11));
        const choiceValue = customOpen ? "custom" : String(current);
        return `
          <div class="ExpectedCountPreset">
            ${renderCustomChoiceControl({
              name: "expected-count",
              value: choiceValue,
              options: expectedCountChoices(),
              testPrefix: "expected-count",
              ariaLabel: "예상 인원 선택",
            })}
            <div class="CustomExpectedCountInput" ${customOpen ? "" : "hidden"}>
              <input class="textInput" data-testid="expected-count-custom-input" name="expected-count-custom" type="number" inputmode="numeric" min="3" max="20" step="1" value="${escapeHtml(customValue)}" aria-label="${escapeHtml(locale.ui.expectedDirectInput)}" />
              <button class="candidateActionButton Button3D" type="button" data-action="confirm-expected-count" data-testid="expected-count-confirm-button">${escapeHtml(locale.ui.expectedConfirm)}</button>
            </div>
          </div>
        `;
      }

      function minimumAttendeeChoices(room) {
        const expected = clampNumber(room.expectedCount, 3, 20, 7);
        return Array.from({ length: expected - 1 }, (_, index) => {
          const count = index + 2;
          return { value: String(count), label: `${count}명` };
        });
      }

      function renderAgreementModeSelector(room, options = {}) {
        const mode = normalizeAgreementMode(room.agreementMode);
        const selectName = options.selectName || "minimum-attendees";
        const testPrefix = options.testPrefix || "agreement";
        const minimumValue = String(agreementMinimum(room));
        return `
          <section class="AgreementModeSelector" data-testid="${escapeHtml(testPrefix)}-mode-selector" aria-label="${escapeHtml(locale.ui.agreementQuestion)}">
            <input type="hidden" name="agreement-mode" value="${escapeHtml(mode)}" />
            <div class="topline">
              <div class="slotMeta">
                <strong>${escapeHtml(locale.ui.agreementQuestion)}</strong>
                <span>${escapeHtml(agreementBody(mode))}</span>
              </div>
              ${reasonChip(agreementModes[mode].className, agreementLabel(mode))}
            </div>
            <div class="AgreementModeGrid" role="radiogroup" aria-label="${escapeHtml(locale.ui.agreementQuestion)}">
              ${Object.keys(agreementModes)
                .map((key) => {
                  const selected = key === mode;
                  return `<button class="AgreementModeButton" type="button" role="radio" aria-checked="${selected}" data-selected="${selected}" data-action="${escapeHtml(options.action || "set-agreement-mode")}" data-agreement-mode="${key}" data-testid="${escapeHtml(testPrefix)}-mode-${key}">
                    <strong>${escapeHtml(agreementLabel(key))}</strong>
                    <span>${escapeHtml(agreementBody(key))}</span>
                  </button>`;
                })
                .join("")}
            </div>
            <div class="AgreementMinimumRow" ${mode === "all_together" ? "hidden" : ""}>
              <span class="helperText">${escapeHtml(locale.ui.agreementThresholdBody)}</span>
              <label class="inputGroup" data-testid="${escapeHtml(testPrefix)}-minimum-attendees">
                <span class="inputLabel">${escapeHtml(locale.ui.minimumAttendees)}</span>
                ${renderCustomChoiceControl({
                  name: selectName,
                  value: minimumValue,
                  options: minimumAttendeeChoices(room),
                  testPrefix: `${testPrefix}-minimum`,
                  ariaLabel: locale.ui.minimumAttendees,
                })}
              </label>
            </div>
          </section>
        `;
      }

      function renderAgreementChangeSheet(room) {
        if (!appState.agreementSheetOpen) return "";
        const draftRoom = {
          ...room,
          agreementMode: pendingResultAgreementMode(),
          minimumAttendees: appState.pendingMinimumAttendees || room.minimumAttendees,
        };
        return `
          <section class="AgreementChangeSheet" data-testid="agreement-change-sheet" aria-label="${escapeHtml(locale.ui.agreementChangeTitle)}">
            <div class="topline">
              <div class="slotMeta">
                <strong>${escapeHtml(locale.ui.agreementChangeTitle)}</strong>
                <span>${escapeHtml(locale.ui.agreementChangeBody)}</span>
              </div>
              ${reasonChip(agreementModes[normalizeAgreementMode(draftRoom.agreementMode)].className, agreementLabel(draftRoom.agreementMode))}
            </div>
            ${renderAgreementModeSelector(draftRoom, {
              action: "set-result-agreement-mode",
              selectName: "result-minimum-attendees",
              testPrefix: "result-agreement",
            })}
            <button class="primaryButton Button3D" type="button" data-action="apply-agreement-mode" data-testid="apply-agreement-mode-button">${escapeHtml(locale.ui.applyAgreement)}</button>
          </section>
        `;
      }

      function renderParticipantRosterInputs(room) {
        const participants = normalizeParticipants(room.participants, room.expectedCount);
        return `
          <section class="RosterInputPanel" data-testid="participant-roster-panel" aria-label="참여자 이름">
            <div class="topline">
              ${reasonChip("brand", `참여자 ${participants.length}명`)}
              <span class="helperText">공유 전 필수</span>
            </div>
            <div class="RosterInputGrid">
              ${participants
                .map((participant, index) => `
                  <label class="inputGroup">
                    <span class="inputLabel">${index + 1}번째 사람</span>
                    <input class="textInput" data-testid="participant-name-input-${index}" name="participant-name-${index}" value="${escapeHtml(participant.name)}" placeholder="이름" autocomplete="off" />
                  </label>
                `)
                .join("")}
            </div>
          </section>
        `;
      }

      function renderParticipantPicker(room, disabled = false) {
        const roster = namedParticipants(room);
        if (!roster.length) return "";
        const answeredIds = new Set((room.responses || []).map((response) => response.participantId).filter(Boolean));
        const answeredNames = new Set((room.responses || []).map((response) => response.alias).filter(Boolean));
        return `
          <section class="ParticipantPickerPanel" data-testid="participant-picker-list" aria-label="내 이름 선택">
            <div class="topline">
              ${reasonChip("brand", "내 이름 선택")}
              <span class="helperText">방장이 입력한 명단에서 골라요</span>
            </div>
            <div class="ParticipantPickerGrid">
              ${roster
                .map((participant) => {
                  const selected = appState.currentParticipantId === participant.id || (!appState.currentParticipantId && appState.currentParticipant === participant.name);
                  const answered = answeredIds.has(participant.id) || answeredNames.has(participant.name);
                  return `<button class="ParticipantPickerButton" type="button" data-action="select-participant" data-participant-id="${escapeHtml(participant.id)}" data-participant-name="${escapeHtml(participant.name)}" data-selected="${selected}" data-answered="${answered}" data-testid="participant-picker-${escapeHtml(participant.name)}" ${disabled ? "disabled" : ""}>
                    <span>${escapeHtml(participant.name)}</span><span>${answered ? "응답됨" : "선택"}</span>
                  </button>`;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      const renderers = {
        "scr-00-entry": () => {
          const copy = screenCopy("scr-00-entry");
          const ranked = appState.room ? rankCandidates(appState.room) : null;
          const stats = appState.room ? participantStats(appState.room) : null;
          const hostedCount = appState.hostRooms?.length || 0;
          const hasIncomingInvite = Boolean(appState.room?.isSharedLink && appState.inviteContext?.status === "valid");
          const savedRoomLine = hasIncomingInvite
            ? formatTemplate(locale.ui.incomingInviteBody, { title: appState.room.title })
            : appState.room
            ? `현재 모임 · ${appState.room.title} · ${ranked.responseCount}명 응답`
            : locale.ui.emptyRoom;
          return `
            <section id="scr-00-entry" class="screen" aria-labelledby="entry-title">
              <div class="screenBody">
                <section class="HomeHero" aria-label="함모여 시작">
                  <strong class="HomeTitleMark" aria-hidden="true">함모여</strong>
                  <div class="HomeHeroContent">
                    <div class="HomeHeroSlogan">
                      <strong id="entry-title">${escapeHtml(hasIncomingInvite ? "받은 초대를 먼저 확인해요" : copy.title)}</strong>
                      <span>${escapeHtml(copy.description)}</span>
                    </div>
                    <div class="HomeHeroPrivacyMessage" data-testid="home-privacy-message">
                      <span>비밀 투표</span>
                      <strong>마지막 투표, 항상 부담되셨죠?</strong>
                      <em>안 맞는 사람은 숨기고, 합의 상황만 함께 봐요.</em>
                    </div>
                  </div>
                  <img class="HomeHeroAnimals" src="assets/final/hero/hero_animals_calendar_full_square.png" alt="" aria-hidden="true" />
                  ${homeHeroStatusOverlay({
                    stats,
                    hostedCount,
                    candidateCount: appState.room ? `${appState.room.candidates.length}개` : "0개",
                    savedRoomLine,
                  })}
                </section>
                ${hasIncomingInvite ? incomingInviteCard(appState.room) : ""}
                ${hasIncomingInvite ? `<p class="guideNote">${escapeHtml(locale.ui.responseInboxHint)}</p>` : ""}
              </div>
            </section>
          `;
        },
        "scr-01-host-room": () => {
          const copy = screenCopy("scr-01-host-room");
          const room = roomOrDraft();
          const primaryLabel = appState.editingRoomId ? locale.ui.saveChanges : copy.primary;
          return `
            <section id="scr-01-host-room" class="screen" aria-labelledby="host-title">
              <div class="screenBody">
                ${standardHeader("scr-01-host-room", "host-title")}
                <form class="formStack" data-room-form>
                  <label class="inputGroup">
                    <span class="inputLabel">모임 이름</span>
                    <input class="textInput" data-testid="room-title-input" name="room-title" value="${escapeHtml(room.title)}" />
                  </label>
                  <div class="formGrid">
                    <label class="inputGroup">
                      <span class="inputLabel">예상 인원</span>
                      ${renderExpectedCountControl(room)}
                    </label>
                    <label class="inputGroup">
                      <span class="inputLabel">응답 마감</span>
                      ${renderDeadlineControl(room)}
                    </label>
                  </div>
                  ${renderAgreementModeSelector(room)}
                  ${renderParticipantRosterInputs(room)}
                  ${renderCandidateInputs(room)}
                </form>
                ${appState.hostFormError ? `<p class="actionStatus error" data-testid="host-form-error">${escapeHtml(appState.hostFormError)}</p>` : `<p class="actionStatus error" data-testid="host-form-error" hidden></p>`}
                <p class="guideNote">${escapeHtml(locale.ui.draftOnlyGuide)}</p>
              </div>
              ${stickyBottomCTA(primaryLabel, null, {
                primaryAction: "create-room",
                primaryTestId: "create-room-button",
              })}
            </section>
          `;
        },
        "scr-02-participant-input": () => {
          const copy = screenCopy("scr-02-participant-input");
          const room = appState.room;
          if (!room) {
            return `
              <section id="scr-02-participant-input" class="screen" aria-labelledby="response-empty-title">
                <div class="screenBody">
                  ${responseInbox(null)}
                </div>
              </section>
            `;
          }
          const ranked = rankCandidates(room);
          if (appState.showResponseInbox) {
            return `
              <section id="scr-02-participant-input" class="screen" aria-labelledby="response-inbox-title">
                <div class="screenBody">
                  ${responseInbox(room)}
                </div>
              </section>
            `;
          }
          const draft = getDraftPreferences(room);
          const isClosed = room.status === "closed" || room.status === "expired";
          const roster = namedParticipants(room);
          return `
            <section id="scr-02-participant-input" class="screen" aria-labelledby="participant-title">
              <div class="screenBody">
                ${standardHeader("scr-02-participant-input", "participant-title")}
                <div class="topline">
                  ${reasonChip("brand", room.title)}
                  <span class="progressPill">${escapeHtml(responseProgressText(room))}</span>
                </div>
                ${agreementChangeNotice(room)}
                <p class="guideNote" data-testid="pre-response-privacy-note">${escapeHtml(locale.ui.preResponsePrivacy)}</p>
                ${renderParticipantPicker(room, isClosed)}
                <label class="inputGroup">
                  <span class="inputLabel">${roster.length ? "선택한 이름" : "내 이름 또는 별명"}</span>
                  <input class="textInput" data-testid="participant-name-input" value="${escapeHtml(appState.currentParticipant)}" placeholder="${roster.length ? "명단에서 선택" : "예: 민지"}" ${roster.length ? "readonly" : ""} ${isClosed ? "disabled" : ""} />
                  <span class="helperText" data-testid="anonymous-name-hint">${escapeHtml(roster.length ? "다른 사람의 응답을 덮어쓰지 않도록 내 이름을 먼저 선택해요." : locale.ui.anonymousHint)}</span>
                </label>
                ${appState.responseError ? `<p class="actionStatus error" data-testid="response-form-error">${escapeHtml(appState.responseError)}</p>` : `<p class="actionStatus error" data-testid="response-form-error" hidden></p>`}
                <div class="compactSection">
                  ${room.candidates
                    .map((candidate) =>
                      candidateSlotCard(candidate, {
                        withSelector: true,
                        selectedStatus: draft[candidate.id],
                        disabled: isClosed,
                      }),
                    )
                    .join("")}
                </div>
                <p class="guideNote">조정하면 가능해요는 늦거나 일정을 조금 바꾸면 갈 수 있다는 뜻이에요.</p>
              </div>
              ${stickyBottomCTA(isClosed ? "응답이 닫혔어요" : copy.primary, null, {
                primaryAction: "submit-response",
                primaryTestId: "submit-response-button",
