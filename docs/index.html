      function currentScreen() {
        const params = new URLSearchParams(window.location.search);
        return screenOrder.includes(params.get("screen")) ? params.get("screen") : "scr-00-entry";
      }

      function buildScreenUrl(nextScreen, options = {}) {
        const screen = screenOrder.includes(nextScreen) ? nextScreen : "scr-00-entry";
        const params = new URLSearchParams(window.location.search);
        params.delete("reset");
        params.set("screen", screen);
        if (screen === "scr-02-participant-input") {
          const existingMode = params.get("response") === "inbox" ? "inbox" : params.get("response") === "detail" ? "detail" : null;
          const responseMode = options.responseMode || existingMode || (appState.showResponseInbox ? "inbox" : "detail");
          params.set("response", responseMode);
        } else {
          params.delete("response");
        }
        return `${window.location.pathname}?${params.toString()}`;
      }

      function routeStateFor(nextScreen, options = {}) {
        const screen = screenOrder.includes(nextScreen) ? nextScreen : "scr-00-entry";
        const state = { screen };
        if (screen === "scr-02-participant-input") {
          const responseMode = options.responseMode || (appState.showResponseInbox ? "inbox" : "detail");
          state.responseMode = responseMode === "inbox" ? "inbox" : "detail";
        }
        return state;
      }

      function rememberRoute(route, replace = false) {
        if (replace || appRouteStack.length === 0) {
          appRouteStack[appRouteStack.length ? appRouteStack.length - 1 : 0] = route;
          return;
        }
        appRouteStack.push(route);
      }

      function previousRouteFromStack(fallbackRoute) {
        return appRouteStack.length > 1 ? appRouteStack[appRouteStack.length - 2] : fallbackRoute;
      }

      function currentRouteFromRender() {
        return routeStateFor(renderedScreen, { responseMode: renderedResponseMode });
      }

      function syncResponseModeFromRoute(screen) {
        if (screen === "scr-02-participant-input") {
          appState.showResponseInbox = responseModeFromUrl() === "inbox";
        } else {
          appState.showResponseInbox = false;
        }
      }

      function selectScreen(nextScreen, replace = false, options = {}) {
        const screen = screenOrder.includes(nextScreen) ? nextScreen : "scr-00-entry";
        const nextUrl = buildScreenUrl(screen, options);
        const nextState = routeStateFor(screen, options);
        if (replace) window.history.replaceState(nextState, "", nextUrl);
        else window.history.pushState(nextState, "", nextUrl);
        rememberRoute(nextState, replace);
        render(screen);
      }

      function renderTabs(activeScreen) {
        tabsRoot.innerHTML = screenOrder
          .map((screen) => {
            const copy = screenCopy(screen);
            return `<button class="tabButton" type="button" role="tab" aria-selected="${screen === activeScreen}" aria-controls="${screen}" data-screen="${screen}" data-active="${screen === activeScreen}">
              <span>${escapeHtml(copy.tab)}</span><span aria-hidden="true">›</span>
            </button>`;
          })
          .join("");

        tabsRoot.querySelectorAll("[data-screen]").forEach((button) => {
          button.addEventListener("click", () => selectScreen(button.dataset.screen));
        });
      }

      function renderBottomNav(activeScreen) {
        bottomNavRoot.innerHTML = bottomNavItems
          .map((item) => {
            const active = item.screens.includes(activeScreen);
            return `<button class="BottomNavItem" type="button" data-tab-key="${escapeHtml(item.key)}" data-active="${active}" data-center="${item.center ? "true" : "false"}" aria-current="${active ? "page" : "false"}" ${actionAttrs(item.action, item.testId)}>
              ${item.center ? `<span class="BottomNavIcon" aria-hidden="true">${escapeHtml(item.icon)}</span>` : ""}
              <span class="BottomNavLabel">${escapeHtml(item.label)}</span>
            </button>`;
          })
          .join("");
      }

      function centerSelectedTimeWheelOptions(root = screenRoot) {
        root.querySelectorAll(".ReleaseTimeWheelColumn").forEach((column) => {
          const selected = column.querySelector('[data-selected="true"]');
          if (selected) {
            column.scrollTop = selected.offsetTop - (column.clientHeight - selected.offsetHeight) / 2;
          }
        });
      }

      function render(screen) {
        applyDebugMode();
        const requested = screenOrder.includes(screen) ? screen : "scr-00-entry";
        const current = applyRouteState(requested);
        if (current !== requested) {
          const currentRoute = routeStateFor(current);
          window.history.replaceState(currentRoute, "", buildScreenUrl(current));
          rememberRoute(currentRoute, true);
        }
        syncResponseModeFromRoute(current);
        applyLocale(activeLocale);
        screenRoot.innerHTML = renderers[current]();
        renderTabs(current);
        renderBottomNav(current);
        renderedScreen = current;
        renderedResponseMode = current === "scr-02-participant-input" ? responseModeFromUrl() : "detail";
        requestAnimationFrame(() => centerSelectedTimeWheelOptions(screenRoot));
      }

      function readRoomForm() {
        const form = screenRoot.querySelector("[data-room-form]");
        const fallbackCandidates = localizedDefaultCandidates();
        const candidateNodes = [...(form?.querySelectorAll("[data-testid^='candidate-date-control-']") || [])];
        const candidateInputs = candidateNodes.slice(0, MAX_CANDIDATES).map((node, index) => {
          const date = form?.querySelector(`[name="candidate-date-${index}"]`)?.value || "";
          const fallback = fallbackCandidates[index] || fallbackCandidates[0];
          return {
            id: `slot-${index + 1}`,
            date,
            label: weekdayLabel(date) || fallback.label,
            time: form?.querySelector(`[name="candidate-time-${index}"]`)?.value || fallback.time,
            note: form?.querySelector(`[name="candidate-note-${index}"]`)?.value || fallback.note,
          };
        });
        const expectedCountChoice = form?.querySelector('[name="expected-count"]')?.value || 7;
        const customExpectedCount = form?.querySelector('[name="expected-count-custom"]')?.value || appState.customExpectedCountValue || appState.hostDraft?.expectedCount || 11;
        const expectedCount = expectedCountChoice === "custom"
          ? clampNumber(customExpectedCount, 3, 20, 11)
          : clampNumber(expectedCountChoice, 3, 20, 7);
        const agreementMode = normalizeAgreementMode(form?.querySelector('[name="agreement-mode"]')?.value);
        const minimumAttendees = agreementMode === "all_together"
          ? defaultMinimumAttendees(expectedCount)
          : normalizeMinimumAttendees(form?.querySelector('[name="minimum-attendees"]')?.value, expectedCount);
        const participants = Array.from({ length: clampNumber(expectedCount, 3, 20, 7) }, (_, index) => ({
          id: participantIdForIndex(index),
          name: form?.querySelector(`[name="participant-name-${index}"]`)?.value || "",
        }));
        return {
          title: form?.querySelector('[name="room-title"]')?.value || "새 모임",
          expectedCount,
          deadlineLabel: form?.querySelector('[name="deadline"]')?.value || "오늘 22:00",
          participants,
          candidates: candidateInputs,
          agreementMode,
          minimumAttendees,
          responses: [],
          status: "collecting",
        };
      }

      function createRoomFromForm() {
        const formRoom = readRoomForm();
        const error = rosterValidationError(formRoom);
        if (error) {
          appState.hostFormError = error;
          appState.hostDraft = createDemoRoom({ ...formRoom, status: "draft" });
          appState.hostDraft.status = "draft";
          hasUnsavedEdits = true;
          saveState();
          render("scr-01-host-room");
          return;
        }
        hasUnsavedEdits = false;
        const existingRoom = appState.editingRoomId
          ? (appState.hostRooms || []).find((savedRoom) => savedRoom.id === appState.editingRoomId) || appState.room
          : null;
        const previousMode = existingRoom ? normalizeAgreementMode(existingRoom.agreementMode) : null;
        const previousMinimum = existingRoom ? agreementMinimum(existingRoom) : null;
        const nextMode = normalizeAgreementMode(formRoom.agreementMode);
        const nextMinimum = normalizeMinimumAttendees(formRoom.minimumAttendees, formRoom.expectedCount);
        const agreementChanged = Boolean(existingRoom && (previousMode !== nextMode || previousMinimum !== nextMinimum));
        const room = createDemoRoom({
          ...formRoom,
          id: existingRoom?.id,
          responses: existingRoom?.responses || [],
          agreementMode: nextMode,
          minimumAttendees: nextMinimum,
          agreementRevision: agreementChanged ? (existingRoom?.agreementRevision || 0) + 1 : existingRoom?.agreementRevision || 0,
          previousAgreementMode: agreementChanged ? previousMode : existingRoom?.previousAgreementMode || null,
          previousMinimumAttendees: agreementChanged ? previousMinimum : existingRoom?.previousMinimumAttendees || null,
          agreementChangedAt: agreementChanged ? new Date().toISOString() : existingRoom?.agreementChangedAt || null,
          status: existingRoom?.status || "collecting",
          selectedCandidateId: existingRoom?.selectedCandidateId || null,
          shareUrl: existingRoom?.shareUrl || "",
          createdAt: existingRoom?.createdAt || new Date().toISOString(),
          closedAt: existingRoom?.closedAt || null,
        });
        const rosterIds = new Set(namedParticipants(room).map((participant) => participant.id));
        const rosterNames = participantNames(room);
        room.responses = room.responses.filter((response) => {
          if (response.participantId) return rosterIds.has(response.participantId);
          return rosterNames.has(response.alias);
        });
        if (!existingRoom) room.status = "collecting";
        room.shareUrl = buildGeneralShareUrl(room);
        appState = {
          version: APP_VERSION,
          room,
          hostRooms: upsertHostRoom(room, appState.hostRooms),
          hostDraft: null,
          editingRoomId: null,
          inviteContext: null,
          revokedRoomIds: appState.revokedRoomIds || [],
          draftPreferences: {},
          currentParticipant: "",
          currentParticipantId: "",
          copyStatus: "",
          hostFormError: "",
          responseError: "",
          openCalendarIndex: null,
          lastSubmittedAt: null,
          lastResponseId: null,
          showResponseInbox: false,
          customExpectedCountOpen: false,
          customExpectedCountValue: "",
          agreementSheetOpen: false,
          pendingAgreementMode: "",
          pendingMinimumAttendees: "",
          openChoicePopover: "",
          openDeadlineCalendar: false,
        };
        appState.draftPreferences = getDraftPreferences(appState.room);
        saveState();
        selectScreen(existingRoom ? "scr-08-my-meetups" : "scr-04-insufficient-response");
      }

      function persistHostDraftFromForm() {
        appState.hostDraft = createDemoRoom({ ...readRoomForm(), status: "draft" });
        appState.hostDraft.status = "draft";
      }

      function confirmExpectedCountInput() {
        const input = screenRoot.querySelector('[name="expected-count-custom"]');
        appState.customExpectedCountOpen = true;
        appState.customExpectedCountValue = String(clampNumber(input?.value || appState.customExpectedCountValue, 3, 20, 11));
        persistHostDraftFromForm();
        hasUnsavedEdits = true;
        saveState();
        render("scr-01-host-room");
      }

      function setDraftAgreementMode(mode) {
        const form = screenRoot.querySelector("[data-room-form]");
        const input = form?.querySelector('[name="agreement-mode"]');
        if (input) input.value = normalizeAgreementMode(mode);
        appState.openChoicePopover = "";
        persistHostDraftFromForm();
        hasUnsavedEdits = true;
        saveState();
        render("scr-01-host-room");
      }

      function pendingResultAgreementMode() {
        return normalizeAgreementMode(appState.pendingAgreementMode || appState.room?.agreementMode);
      }

      function setResultAgreementMode(mode) {
        appState.pendingAgreementMode = normalizeAgreementMode(mode);
        appState.pendingMinimumAttendees = appState.pendingMinimumAttendees || String(agreementMinimum(appState.room));
        appState.openChoicePopover = "";
        saveState();
        render("scr-03-result-recommendation");
      }

      function applyAgreementModeFromSheet() {
        if (!appState.room) return;
        const previousMode = normalizeAgreementMode(appState.room.agreementMode);
        const previousMinimum = agreementMinimum(appState.room);
        const nextMode = pendingResultAgreementMode();
        const minimumInput = screenRoot.querySelector('[name="result-minimum-attendees"]');
        const nextMinimum = nextMode === "all_together"
          ? defaultMinimumAttendees(appState.room.expectedCount)
          : normalizeMinimumAttendees(appState.pendingMinimumAttendees || minimumInput?.value || appState.room.minimumAttendees, appState.room.expectedCount);
        const changed = previousMode !== nextMode || previousMinimum !== nextMinimum;
        appState.room.agreementMode = nextMode;
        appState.room.minimumAttendees = nextMinimum;
        if (changed) {
          appState.room.previousAgreementMode = previousMode;
          appState.room.previousMinimumAttendees = previousMinimum;
          appState.room.agreementRevision = (appState.room.agreementRevision || 0) + 1;
          appState.room.agreementChangedAt = new Date().toISOString();
        }
        appState.pendingAgreementMode = "";
        appState.pendingMinimumAttendees = "";
        appState.openChoicePopover = "";
        appState.agreementSheetOpen = false;
        refreshRoomStatus(appState.room);
        appState.room.shareUrl = buildGeneralShareUrl(appState.room);
        syncActiveRoomToHostRooms();
        saveState();
        selectScreen(rankCandidates(appState.room).top ? "scr-03-result-recommendation" : "scr-04-insufficient-response", true);
      }

      function upsertHostRoom(room, rooms = []) {
        if (!room || room.isSharedLink) return rooms || [];
        const next = (rooms || []).filter((savedRoom) => savedRoom.id !== room.id);
        next.unshift(createDemoRoom(room));
        return next.slice(0, 20);
      }

      function syncActiveRoomToHostRooms() {
        if (!isDemoMode() && appState.room && !appState.room.isSharedLink) {
          appState.hostRooms = upsertHostRoom(appState.room, appState.hostRooms);
        }
      }

      function addCandidateToDraft() {
        persistHostDraftFromForm();
        const fallback = localizedDefaultCandidates()[appState.hostDraft.candidates.length % localizedDefaultCandidates().length];
        appState.hostDraft.candidates.push(
          normalizeCandidate(
            {
              id: `slot-${appState.hostDraft.candidates.length + 1}`,
              date: "",
              label: fallback.label,
              time: fallback.time,
              note: fallback.note,
            },
            appState.hostDraft.candidates.length,
          ),
        );
        hasUnsavedEdits = true;
        render("scr-01-host-room");
      }

      function removeCandidateFromDraft(index) {
        persistHostDraftFromForm();
        if (appState.hostDraft.candidates.length <= 2) return;
        appState.hostDraft.candidates.splice(index, 1);
        appState.hostDraft.candidates = appState.hostDraft.candidates.map((candidate, nextIndex) => ({
          ...candidate,
          id: `slot-${nextIndex + 1}`,
        }));
        hasUnsavedEdits = true;
        render("scr-01-host-room");
      }

      function syncTimeWheelSelection(control, value) {
        const { hour, minute } = parseTimeParts(value);
        control?.querySelectorAll("[data-time-part]").forEach((button) => {
          const selected =
            (button.dataset.timePart === "hour" && Number(button.dataset.timeToken) === hour) ||
            (button.dataset.timePart === "minute" && button.dataset.timeToken === minute);
          button.dataset.selected = String(selected);
          button.setAttribute("aria-checked", String(selected));
        });
        centerSelectedTimeWheelOptions(control);
      }

      function rerenderAfterChoice(choice) {
        if (choice?.startsWith("result-agreement")) {
          render("scr-03-result-recommendation");
          return;
        }
        render(currentScreen());
      }

      function toggleChoicePopover(choice) {
        if (screenRoot.querySelector("[data-room-form]")) persistHostDraftFromForm();
        appState.openChoicePopover = appState.openChoicePopover === choice ? "" : choice;
        saveState();
        rerenderAfterChoice(choice);
      }

      function setCustomChoiceValue(target) {
        const choice = target.dataset.choice || "";
        const value = target.dataset.choiceValue || "";
        const name = target.dataset.choiceName || "";
        const form = screenRoot.querySelector("[data-room-form]");
        appState.openChoicePopover = "";
        if (choice === "expected-count") {
          const input = form?.querySelector(`[name="${name}"]`);
          if (input) input.value = value;
          appState.customExpectedCountOpen = value === "custom";
          if (value === "custom") {
            appState.customExpectedCountValue = String(clampNumber(appState.customExpectedCountValue || appState.hostDraft?.expectedCount || 11, 3, 20, 11));
          } else {
            appState.customExpectedCountValue = "";
          }
          appState.hostFormError = "";
          persistHostDraftFromForm();
          hasUnsavedEdits = true;
          saveState();
          render("scr-01-host-room");
          return;
        }
        if (choice === "agreement-minimum") {
          const input = form?.querySelector(`[name="${name}"]`);
          if (input) input.value = value;
          appState.hostFormError = "";
          persistHostDraftFromForm();
          hasUnsavedEdits = true;
          saveState();
          render("scr-01-host-room");
          return;
        }
        if (choice === "result-agreement-minimum") {
          appState.pendingMinimumAttendees = value;
          saveState();
          render("scr-03-result-recommendation");
        }
      }

      function setDeadlineChoice(target, field) {
        const form = screenRoot.querySelector("[data-room-form]");
        const input = form?.querySelector('[name="deadline"]');
        if (!input) return;
        const current = parseDeadlineParts(input.value);
        let nextDate = current.date;
        let nextTime = current.time;
        if (field === "date") {
          nextDate = target.dataset.value || current.date;
        }
        if (field === "time") {
          const currentTime = parseTimeParts(current.time);
          const part = target.dataset.timePart;
          const token = target.dataset.timeToken;
          let nextHour = currentTime.hour;
          let nextMinute = currentTime.minute;
          if (part === "hour") nextHour = Math.min(23, Math.max(0, Number.parseInt(token, 10) || 0));
          if (part === "minute") nextMinute = buildContinuousMinuteValues().includes(token) ? token : currentTime.minute;
          nextTime = formatTimeValue(nextHour, nextMinute);
          syncTimeWheelSelection(target.closest(".ReleaseTimeControl"), nextTime);
        }
        input.value = formatDeadlineLabel(nextDate, nextTime);
        if (field === "date") {
          const trigger = screenRoot.querySelector('[data-testid="deadline-calendar-trigger"] span');
          if (trigger) trigger.textContent = weekdayLabel(nextDate);
          const grid = target.closest('[role="grid"]');
          grid?.querySelectorAll("[data-selected]").forEach((button) => {
            const selected = button === target;
            button.dataset.selected = String(selected);
            button.setAttribute("aria-selected", String(selected));
          });
          const sheet = screenRoot.querySelector('[data-testid="deadline-calendar-sheet"]');
          if (sheet) sheet.hidden = true;
          appState.openDeadlineCalendar = false;
        }
        hasUnsavedEdits = true;
      }

      function setCandidateChoice(target, field) {
        const form = screenRoot.querySelector("[data-room-form]");
        const index = Number(target.dataset.candidateIndex || 0);
        const value = target.dataset.value || "";
        const input = form?.querySelector(`[name="candidate-${field}-${index}"]`);
        if (!input || !value) return;
        if (field === "time") {
          const current = parseTimeParts(input.value);
          const part = target.dataset.timePart;
          const token = target.dataset.timeToken;
          let nextHour = current.hour;
          let nextMinute = current.minute;
          if (part === "hour") {
            nextHour = Math.min(23, Math.max(0, Number.parseInt(token, 10) || 0));
          } else if (part === "minute") {
            nextMinute = ["00", "10", "20", "30", "40", "50"].includes(token) ? token : current.minute;
          } else {
            const fallback = parseTimeParts(value);
            nextHour = fallback.hour;
            nextMinute = fallback.minute;
          }
          input.value = formatTimeValue(nextHour, nextMinute);
          syncTimeWheelSelection(target.closest(".ReleaseTimeControl"), input.value);
          hasUnsavedEdits = true;
          return;
        }
        input.value = value;
        if (field === "date") {
          const selectedLabel = weekdayLabel(value);
          const trigger = target.closest(".IPhoneCalendarPicker")?.querySelector(".CalendarTrigger span");
          if (trigger && selectedLabel) trigger.textContent = selectedLabel;
          const sheet = target.closest(".ReleaseCalendarSheet");
          if (sheet) sheet.hidden = true;
          appState.openCalendarIndex = null;
        }
        const group = target.closest('[role="radiogroup"], [role="grid"]');
        const selectionAttribute = group?.getAttribute("role") === "grid" ? "aria-selected" : "aria-checked";
        group?.querySelectorAll("[data-selected]").forEach((button) => {
          const selected = button === target;
          button.dataset.selected = String(selected);
          button.setAttribute(selectionAttribute, String(selected));
        });
        hasUnsavedEdits = true;
      }

      function submitResponse() {
        const room = appState.room;
        if (!room) {
          selectScreen("scr-00-entry");
          return;
        }
        if (isRoomRevoked(room)) {
          room.status = "expired";
          saveState();
          selectScreen("scr-05-link-expired");
          return;
        }
        if (isTerminalRoom(room)) return;
        const aliasInput = screenRoot.querySelector('[data-testid="participant-name-input"]');
        const rawAlias = (aliasInput?.value || appState.currentParticipant || "").trim();
        const roster = namedParticipants(room);
        const selectedParticipant = roster.find((participant) => participant.id === appState.currentParticipantId) || roster.find((participant) => participant.name === rawAlias);
        if (roster.length && !selectedParticipant) {
          appState.responseError = "명단에서 내 이름을 먼저 선택해주세요.";
          saveState();
          render("scr-02-participant-input");
          return;
        }
        const existingResponse = selectedParticipant
          ? room.responses.find((response) => response.participantId === selectedParticipant.id || (!response.participantId && response.alias === selectedParticipant.name))
          : null;
        const editingResponseId = selectedParticipant ? existingResponse?.id || "" : appState.lastResponseId;
        const alias = selectedParticipant?.name || rawAlias || nextAnonymousAlias(room, editingResponseId);
        const responseId = existingResponse?.id || editingResponseId || (selectedParticipant ? `response-${selectedParticipant.id}` : `response-${Date.now().toString(36)}`);
        appState.currentParticipant = alias;
        appState.currentParticipantId = selectedParticipant?.id || "";
        const draft = getDraftPreferences(room);
        room.responses = room.responses.filter((response) => {
          if (selectedParticipant) return response.participantId !== selectedParticipant.id && response.alias !== selectedParticipant.name;
          if (editingResponseId) return response.id !== editingResponseId;
          if (rawAlias) return response.alias !== alias;
          return true;
        });
        room.responses.push(
          normalizeResponse({
            id: responseId,
            participantId: selectedParticipant?.id || "",
            alias,
            preferences: draft,
          }),
        );
        refreshRoomStatus(room);
        appState.copyStatus = "";
        appState.responseError = "";
        appState.lastSubmittedAt = new Date().toISOString();
        appState.lastResponseId = responseId;
        hasUnsavedEdits = false;
        syncActiveRoomToHostRooms();
        saveState();
        selectScreen("scr-02b-response-complete");
      }

      function seedResponses() {
        const room = appState.room;
        if (!room) return;
        if (isTerminalRoom(room) || !isDemoMode()) return;
        const existingAliases = new Set(room.responses.map((response) => response.alias));
        for (const response of sampleResponsesFor(room)) {
          if (!existingAliases.has(response.alias)) {
            room.responses.push(response);
            existingAliases.add(response.alias);
          }
          if (room.responses.length >= minimumResponses(room.expectedCount)) break;
        }
        refreshRoomStatus(room);
        appState.copyStatus = "";
        syncActiveRoomToHostRooms();
        saveState();
        selectScreen(rankCandidates(room).top ? "scr-03-result-recommendation" : "scr-04-insufficient-response");
      }

      async function copyExplicitText(text, screen = currentScreen()) {
        let copied = false;
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            copied = true;
          } catch {
            copied = false;
          }
        }
        if (!copied) {
          const holder = document.createElement("textarea");
          holder.value = text;
          holder.setAttribute("readonly", "");
          holder.style.position = "fixed";
          holder.style.opacity = "0";
          document.body.appendChild(holder);
          holder.select();
          try {
            copied = document.execCommand("copy");
          } catch {
            copied = false;
          } finally {
            holder.remove();
          }
        }
        appState.copyStatus = copied ? locale.ui.copySucceeded : locale.ui.copyFailed;
        saveState();
        render(screen);
      }

      function combineSharePayload(payload) {
        return [payload.text, payload.url].filter(Boolean).join("\n");
      }

      function sharePayloadForAction(room, action, ranked = rankCandidates(room)) {
        const url = room.shareUrl || buildGeneralShareUrl(room);
        if (action === "copy-invite") {
          return {
            title: room.title,
            text: formatTemplate(locale.ui.inviteShareText, { title: room.title }),
            url,
          };
        }
        if (action === "copy-reminder") {
          return {
            title: room.title,
            text: buildReminderText(room, ranked),
            url,
          };
        }
        const text = room.status === "closed" ? buildConfirmedText(room, ranked) : buildRecommendationText(room, ranked);
        return {
          title: room.title,
          text,
          url,
        };
      }

      async function shareExplicitPayload(payload, screen = currentScreen()) {
        if (navigator.share) {
          try {
            await navigator.share(payload);
            appState.copyStatus = locale.ui.shareSucceeded;
            saveState();
            render(screen);
            return;
          } catch (error) {
            if (error?.name === "AbortError") {
              appState.copyStatus = locale.ui.shareCanceled;
              saveState();
              render(screen);
              return;
            }
          }
        }
        await copyExplicitText(combineSharePayload(payload), screen);
      }

      async function copyShareText(action = "copy-share") {
        if (!appState.room) return;
        await shareExplicitPayload(sharePayloadForAction(appState.room, action, rankCandidates(appState.room)));
      }

      async function shareRoomInvite(room, screen = currentScreen()) {
        if (!room) return;
        await shareExplicitPayload(sharePayloadForAction(room, "copy-invite", rankCandidates(room)), screen);
      }

      function closeRoom() {
        if (!appState.room) return;
        if (appState.room.status === "expired") {
          selectScreen("scr-05-link-expired");
          return;
        }
        if (appState.room.status === "closed") {
          selectScreen("scr-06-room-closed");
          return;
        }
        const ranked = rankCandidates(appState.room);
        appState.room.selectedCandidateId = ranked.top?.candidate.id || appState.room.candidates[0].id;
        appState.room.status = "closed";
        appState.room.closedAt = new Date().toISOString();
        appState.copyStatus = "";
        syncActiveRoomToHostRooms();
        saveState();
        selectScreen("scr-06-room-closed");
      }

      function revokeRoomId(roomId) {
        if (!roomId) return;
        const revoked = new Set(appState.revokedRoomIds || []);
        revoked.add(roomId);
        appState.revokedRoomIds = [...revoked];
      }

      function deleteHostedRoom(roomId) {
        const room = (appState.hostRooms || []).find((savedRoom) => savedRoom.id === roomId) || appState.room;
        if (!room || room.isSharedLink) return;
        requestConfirmation({ kind: "delete-room", roomId: room.id });
      }

      function performDeleteHostedRoom(roomId) {
        const room = (appState.hostRooms || []).find((savedRoom) => savedRoom.id === roomId) || appState.room;
        if (!room || room.isSharedLink) return;
        revokeRoomId(room.id);
        appState.hostRooms = (appState.hostRooms || []).filter((savedRoom) => savedRoom.id !== room.id);
        if (appState.room?.id === room.id) {
          appState.room = null;
          appState.draftPreferences = {};
          appState.lastSubmittedAt = null;
          appState.lastResponseId = null;
        }
        if (appState.editingRoomId === room.id) {
          appState.editingRoomId = null;
          appState.hostDraft = null;
        }
        appState.copyStatus = locale.ui.roomDeleted;
        hasUnsavedEdits = false;
        saveState();
        selectScreen("scr-08-my-meetups", true);
      }

      function openParticipationTab() {
        appState.copyStatus = "";
        if (!appState.room) {
          appState.showResponseInbox = true;
          saveState();
          selectScreen("scr-02-participant-input", false, { responseMode: "inbox" });
          return;
        }
        if (appState.inviteContext?.status === "deleted" || appState.room.status === "expired") {
          selectScreen("scr-05-link-expired");
          return;
        }
        if (appState.room.status === "closed") {
          selectScreen("scr-06-room-closed");
          return;
        }
        appState.showResponseInbox = true;
        saveState();
        selectScreen("scr-02-participant-input", false, { responseMode: "inbox" });
      }

      function handleAction(action, target) {
        if (!action) return;
        if (target?.disabled) return;
        if (action === "confirm-modal-cancel") {
          closeConfirmation();
          return;
        }
        if (action === "confirm-modal-confirm") {
          applyPendingConfirmation();
          return;
        }
        if (!confirmNavigationIfDirty(action, target)) return;
        if (action === "start-create-room") {
          appState.copyStatus = "";
          appState.showResponseInbox = false;
          appState.hostDraft = createDraftRoom();
          appState.editingRoomId = null;
          selectScreen("scr-01-host-room");
        }
        if (action === "open-host-dashboard") {
          appState.copyStatus = "";
          appState.showResponseInbox = false;
          selectScreen("scr-08-my-meetups");
        }
        if (action === "open-participation-tab") openParticipationTab();
        if (action === "respond-to-invite") {
          if (!appState.room || appState.inviteContext?.status === "deleted" || isTerminalRoom(appState.room)) {
            selectScreen("scr-05-link-expired");
            return;
          }
          appState.copyStatus = "";
          appState.showResponseInbox = true;
          appState.draftPreferences = getDraftPreferences(appState.room);
          saveState();
          selectScreen("scr-02-participant-input", false, { responseMode: "inbox" });
        }
        if (action === "open-response-room") {
          if (!appState.room) return;
          appState.copyStatus = "";
          appState.showResponseInbox = false;
          appState.draftPreferences = getDraftPreferences(appState.room);
          saveState();
          if (appState.lastSubmittedAt) {
            selectScreen("scr-02b-response-complete");
          } else {
            selectScreen("scr-02-participant-input", false, { responseMode: "detail" });
          }
        }
        if (action === "open-existing-room") {
          if (!appState.room) return;
          appState.showResponseInbox = false;
          if (appState.room.status === "expired") {
            selectScreen("scr-05-link-expired");
            return;
          }
          if (appState.room.status === "closed") {
            selectScreen("scr-06-room-closed");
            return;
          }
          const ranked = rankCandidates(appState.room);
          selectScreen(ranked.top ? "scr-03-result-recommendation" : "scr-02-participant-input");
        }
        if (action === "create-room") createRoomFromForm();
        if (action === "set-agreement-mode") setDraftAgreementMode(target.dataset.agreementMode);
        if (action === "toggle-agreement-sheet") {
          appState.agreementSheetOpen = !appState.agreementSheetOpen;
          appState.pendingAgreementMode = normalizeAgreementMode(appState.room?.agreementMode);
          appState.pendingMinimumAttendees = String(agreementMinimum(appState.room));
          appState.openChoicePopover = "";
          saveState();
          render("scr-03-result-recommendation");
        }
        if (action === "set-result-agreement-mode") setResultAgreementMode(target.dataset.agreementMode);
        if (action === "apply-agreement-mode") applyAgreementModeFromSheet();
        if (action === "add-candidate") addCandidateToDraft();
        if (action === "remove-candidate") removeCandidateFromDraft(Number(target.dataset.candidateIndex || 0));
        if (action === "confirm-expected-count") confirmExpectedCountInput();
        if (action === "toggle-choice-popover") toggleChoicePopover(target.dataset.choice || "");
        if (action === "set-choice-value") setCustomChoiceValue(target);
        if (action === "toggle-deadline-calendar") {
          const sheet = screenRoot.querySelector('[data-testid="deadline-calendar-sheet"]');
          const shouldOpen = sheet?.hidden;
          screenRoot.querySelectorAll(".ReleaseCalendarSheet").forEach((node) => {
            node.hidden = true;
          });
          if (sheet) sheet.hidden = !shouldOpen;
          target.setAttribute("aria-expanded", String(Boolean(shouldOpen)));
          appState.openDeadlineCalendar = Boolean(shouldOpen);
        }
        if (action === "set-deadline-date") setDeadlineChoice(target, "date");
        if (action === "set-deadline-time") setDeadlineChoice(target, "time");
        if (action === "toggle-candidate-calendar") {
          const index = Number(target.dataset.candidateIndex || 0);
          const sheet = screenRoot.querySelector(`[data-testid="candidate-calendar-sheet-${index}"]`);
          const shouldOpen = sheet?.hidden;
          screenRoot.querySelectorAll(".ReleaseCalendarSheet").forEach((node) => {
            node.hidden = true;
          });
          if (sheet) sheet.hidden = !shouldOpen;
          target.setAttribute("aria-expanded", String(Boolean(shouldOpen)));
          appState.openCalendarIndex = shouldOpen ? index : null;
        }
        if (action === "set-candidate-date") setCandidateChoice(target, "date");
        if (action === "set-candidate-time") setCandidateChoice(target, "time");
        if (action === "open-room-status") {
          const room = (appState.hostRooms || []).find((savedRoom) => savedRoom.id === target.dataset.roomId);
          if (!room) return;
          appState.room = createDemoRoom(room);
          appState.copyStatus = "";
          appState.showResponseInbox = false;
          saveState();
          if (appState.room.status === "closed") selectScreen("scr-06-room-closed");
          else selectScreen(rankCandidates(appState.room).top ? "scr-03-result-recommendation" : "scr-04-insufficient-response");
        }
        if (action === "edit-host-room") {
          const room = (appState.hostRooms || []).find((savedRoom) => savedRoom.id === target.dataset.roomId);
          if (!room) return;
          appState.hostDraft = createDemoRoom(room);
          appState.editingRoomId = room.id;
          appState.copyStatus = "";
          appState.showResponseInbox = false;
          hasUnsavedEdits = false;
          saveState();
          selectScreen("scr-01-host-room");
        }
        if (action === "copy-room-link") {
          const room = (appState.hostRooms || []).find((savedRoom) => savedRoom.id === target.dataset.roomId);
          if (!room) return;
          appState.room = createDemoRoom(room);
          shareRoomInvite(appState.room, "scr-08-my-meetups");
        }
        if (action === "copy-participant-link") {
          const room =
            (appState.hostRooms || []).find((savedRoom) => savedRoom.id === target.dataset.roomId) ||
            (appState.room?.id === target.dataset.roomId ? appState.room : null);
          const participant = namedParticipants(room).find((item) => item.id === target.dataset.participantId);
          if (!room || !participant) return;
          copyExplicitText(buildParticipantShareUrl(room, participant), currentScreen());
        }
        if (action === "delete-room") {
          deleteHostedRoom(target.dataset.roomId);
        }
        if (action === "set-preference") {
          if (!appState.room) return;
          if (isTerminalRoom(appState.room)) return;
          const previousScrollTop = screenRoot.querySelector(".screenBody")?.scrollTop || 0;
          hasUnsavedEdits = true;
          appState.draftPreferences = getDraftPreferences(appState.room);
          appState.draftPreferences[target.dataset.candidateId] = normalizeStatus(target.dataset.status);
          appState.copyStatus = "";
          saveState();
          render(currentScreen());
          const nextBody = screenRoot.querySelector(".screenBody");
          if (nextBody) nextBody.scrollTop = previousScrollTop;
        }
        if (action === "select-participant") {
          if (!appState.room) return;
          const participant = namedParticipants(appState.room).find((item) => item.id === target.dataset.participantId) || {
            id: target.dataset.participantId || "",
            name: target.dataset.participantName || "",
          };
          const existingResponse = appState.room.responses.find((response) => response.participantId === participant.id || response.alias === participant.name);
          appState.currentParticipant = participant.name;
          appState.currentParticipantId = participant.id;
          appState.responseError = "";
          appState.lastResponseId = existingResponse?.id || null;
          appState.draftPreferences = existingResponse?.preferences ? { ...existingResponse.preferences } : getDraftPreferences(appState.room);
          saveState();
          render("scr-02-participant-input");
        }
        if (action === "submit-response") submitResponse();
        if (action === "edit-response") selectScreen("scr-02-participant-input");
        if (action === "seed-responses") seedResponses();
        if (action === "copy-share" || action === "copy-invite" || action === "copy-reminder") copyShareText(action);
        if (action === "close-room") closeRoom();
        if (action === "go-home") selectScreen("scr-00-entry");
        if (action === "open-settings") selectScreen("scr-07-settings");
        if (action === "clear-local-data") clearLocalData();
        if (action === "logout") {
          appState.copyStatus = locale.ui.logoutDone;
          saveState();
          render("scr-07-settings");
        }
      }

      appRoot.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        handleAction(target?.dataset.action, target);
      });

      screenRoot.addEventListener("input", (event) => {
        if (event.target.closest("[data-room-form]") || event.target.matches('[data-testid="participant-name-input"]')) {
          hasUnsavedEdits = true;
        }
        if (event.target.closest("[data-room-form]")) {
          appState.hostFormError = "";
        }
        if (event.target.matches('[data-testid="participant-name-input"]')) {
          appState.currentParticipant = event.target.value;
          appState.currentParticipantId = "";
          appState.responseError = "";
        }
      });

      screenRoot.addEventListener("change", (event) => {
        if (event.target.matches('[name="expected-count"]')) {
          const isCustom = event.target.value === "custom";
          appState.customExpectedCountOpen = isCustom;
          appState.customExpectedCountValue = isCustom
            ? String(clampNumber(appState.customExpectedCountValue || appState.hostDraft?.expectedCount || 11, 3, 20, 11))
            : "";
          appState.hostFormError = "";
          persistHostDraftFromForm();
          hasUnsavedEdits = true;
          render("scr-01-host-room");
        }
        if (event.target.matches('[name="minimum-attendees"]')) {
          appState.hostFormError = "";
          persistHostDraftFromForm();
          hasUnsavedEdits = true;
          render("scr-01-host-room");
        }
      });

      window.HAMMOYEO_APP_TESTS = {
        minimumResponses,
        agreementMinimum,
        requiredResponsesForAgreement,
        rankCandidates,
        summarizeCandidate,
        buildShareText,
        buildCopyTextForAction,
        createDemoRoom,
      };

      const initialParams = new URLSearchParams(window.location.search);
      const initialScreen = initialParams.get("screen") || "scr-00-entry";
      applyDebugMode();
      selectScreen(initialScreen, true);

      window.addEventListener("popstate", (event) => {
        const stateScreen = event.state?.screen;
        const nextScreen = screenOrder.includes(stateScreen) ? stateScreen : currentScreen();
        const nextResponseMode = event.state?.responseMode === "inbox" ? "inbox" : "detail";
        const fallbackRoute = routeStateFor(nextScreen, { responseMode: nextResponseMode });
        const nextRoute = previousRouteFromStack(fallbackRoute);
        if (shouldConfirmNavigation("history")) {
          const currentRoute = currentRouteFromRender();
          const currentUrl = buildScreenUrl(currentRoute.screen, { responseMode: currentRoute.responseMode });
          window.history.pushState(currentRoute, "", currentUrl);
          requestConfirmation({ kind: "history", nextRoute });
          return;
        }
        if (appRouteStack.length > 1) appRouteStack.pop();
        else rememberRoute(nextRoute, true);
        render(nextRoute.screen);
      });
    </script>
  </body>
</html>
