<!doctype html><html><head><meta charset='utf-8'><title>SCR-01 Entry</title><style>body{margin:0;background:#eef2ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.phone{width:375px;margin:24px auto;background:#fff;min-height:720px;border-radius:32px;box-shadow:0 16px 48px #1e293b33;overflow:hidden}.pad{padding:24px}.badge{display:inline-block;background:#e0e7ff;color:#4338ca;padding:6px 10px;border-radius:999px;font-weight:700;font-size:12px}.h{font-size:28px;font-weight:800;line-height:1.15;margin:18px 0}.p{color:#475569;font-size:15px;line-height:1.55}.card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:16px;margin:14px 0}.btn{background:#4f46e5;color:white;padding:15px;border-radius:16px;text-align:center;font-weight:800;margin-top:18px}.chip{display:inline-block;padding:8px 10px;margin:4px;border-radius:999px;background:#fff;border:1px solid #cbd5e1}.safe{color:#15803d}.warn{color:#b45309}</style></head><body><main class='phone'><section class='pad'><span class='badge'>함모여 · SCR-01</span><h1 class='h'>전원 가능한 시간이 없어도,<br>가장 무리 없는 약속안을 찾아요.</h1><p class='p'>가능 시간표에서 끝나지 않고, 단톡방에 올릴 확정 문구까지 만들어드립니다.</p><div class='card'><b>예시</b><p class='p'>“토요일 18시가 가장 고르게 가능해요. 특별히 어려운 분이 없으면 이 안으로 정리해볼게요.”</p></div><div class='btn'>모임 만들기</div><p class='p'>로그인 없이 참여자는 약 20초만 입력합니다.</p></section></main></body></html>
