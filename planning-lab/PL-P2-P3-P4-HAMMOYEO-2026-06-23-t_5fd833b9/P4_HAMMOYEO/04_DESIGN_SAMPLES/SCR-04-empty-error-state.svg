<svg xmlns='http://www.w3.org/2000/svg' width='390' height='844' viewBox='0 0 390 844'>
<rect width='390' height='844' rx='32' fill='#F8FAFC'/><rect x='24' y='28' width='342' height='788' rx='28' fill='white' stroke='#E5EAF2'/>
<text x='48' y='86' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='13' font-weight='700' fill='#E35D5B'>SCR-04 · 응답 부족</text>
<text x='48' y='136' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='28' font-weight='800' fill='#17233D'>아직 추천을 내기엔</text>
<text x='48' y='172' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='28' font-weight='800' fill='#17233D'>응답이 부족해요</text>
<rect x='48' y='214' width='294' height='124' rx='18' fill='#FFF7E6' stroke='#FFE0A3'/>
<text x='68' y='252' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='16' font-weight='700' fill='#8A5A00'>현재 2명 응답</text>
<text x='68' y='284' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='14' fill='#8A5A00'>추천을 내기 전 최소 4명 이상의</text>
<text x='68' y='306' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='14' fill='#8A5A00'>응답을 더 받아보는 게 안전합니다.</text>
<rect x='48' y='380' width='294' height='56' rx='16' fill='#17233D'/><text x='105' y='416' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='16' font-weight='800' fill='white'>응답 요청 문구 복사</text>
<rect x='48' y='452' width='294' height='56' rx='16' fill='#EEF2F7'/><text x='128' y='488' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='16' font-weight='800' fill='#17233D'>후보 다시 정하기</text>
<text x='48' y='560' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='14' fill='#667085'>관계 안전 문구 예시</text>
<rect x='48' y='580' width='294' height='126' rx='18' fill='#F6F8FB' stroke='#B8C2D2' stroke-dasharray='6 5'/>
<text x='68' y='620' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='14' fill='#17233D'>아직 응답이 조금 부족해서,</text>
<text x='68' y='644' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='14' fill='#17233D'>가능한 분들은 후보 시간만 빠르게</text>
<text x='68' y='668' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='14' fill='#17233D'>체크 부탁드릴게요.</text>
</svg>