<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>SCR-01 함모여 방장 약속방 생성</title><style>
:root{--navy:#17233D;--green:#2BB673;--amber:#F4B740;--red:#E35D5B;--bg:#F8FAFC;--muted:#667085}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--navy)}.phone{width:390px;min-height:844px;margin:24px auto;background:white;border-radius:32px;padding:28px;box-shadow:0 24px 80px #17233d22}.eyebrow{font-size:13px;color:var(--green);font-weight:700}.title{font-size:28px;line-height:1.2;margin:10px 0 8px}.sub{font-size:15px;color:var(--muted);line-height:1.5}.card{border:1px solid #E5EAF2;border-radius:20px;padding:16px;margin:14px 0;background:#fff}.chip{display:inline-flex;padding:10px 12px;border-radius:999px;margin:4px;background:#EEF6F1;color:#12633E;font-weight:700;font-size:13px}.btn{width:100%;border:0;border-radius:16px;background:var(--navy);color:white;padding:16px;font-weight:800;font-size:16px;margin-top:18px}.secondary{background:#EEF2F7;color:var(--navy)}.field{border:1px solid #D8DEE9;border-radius:14px;padding:14px;margin-top:8px;color:#98A2B3}.warn{background:#FFF7E6;border:1px solid #FFE0A3;color:#8A5A00}.ok{background:#EAF8F0;border:1px solid #BCE8CC}.copy{white-space:pre-line;background:#F6F8FB;border:1px dashed #B8C2D2;border-radius:16px;padding:14px;line-height:1.55}.grid{display:grid;gap:10px}.pref{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pref button{border:1px solid #D8DEE9;background:white;border-radius:12px;padding:10px;font-weight:700}.pref .on{background:#EAF8F0;border-color:var(--green);color:#12633E}
</style></head><body>
<main class='phone'>
  <div class='eyebrow'>SCR-01 · 방장 시작</div>
  <h1 class='title'>이번 모임, 후보만 빠르게 잡아볼까요?</h1>
  <p class='sub'>후보는 나중에 수정할 수 있어요. 참여자는 링크에서 10~30초 안에 답하면 됩니다.</p>
  <section class='card'><b>모임 이름</b><div class='field'>6월 스터디 뒤풀이</div></section>
  <section class='card'><b>후보 시간</b><div><span class='chip'>토 18:00</span><span class='chip'>토 19:30</span><span class='chip'>일 17:00</span></div></section>
  <section class='card'><b>최소 조건</b><p class='sub'>강남/신논현 근처 · 식사 또는 카페 · 늦어도 2시간</p></section>
  <button class='btn'>초대 링크 만들기</button><button class='btn secondary'>후보 자동 채우기</button>
</main></body></html>
