<!doctype html><html><head><meta charset='utf-8'><title>SCR-04 Copy</title><style>body{margin:0;background:#eef2ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.phone{width:375px;margin:24px auto;background:#fff;min-height:720px;border-radius:32px;box-shadow:0 16px 48px #1e293b33;overflow:hidden}.pad{padding:24px}.badge{display:inline-block;background:#e0e7ff;color:#4338ca;padding:6px 10px;border-radius:999px;font-weight:700;font-size:12px}.h{font-size:28px;font-weight:800;line-height:1.15;margin:18px 0}.p{color:#475569;font-size:15px;line-height:1.55}.card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:16px;margin:14px 0}.btn{background:#4f46e5;color:white;padding:15px;border-radius:16px;text-align:center;font-weight:800;margin-top:18px}.chip{display:inline-block;padding:8px 10px;margin:4px;border-radius:999px;background:#fff;border:1px solid #cbd5e1}.safe{color:#15803d}.warn{color:#b45309}</style></head><body><main class='phone'><section class='pad'><span class='badge'>SCR-04 · 문구 만들기</span><h1 class='h'>단톡방에 올릴 문구</h1><div class='card'><p class='p'>응답을 모아보니 토요일 18시가 가장 무리가 적은 후보로 보여요. 특별히 어려운 분이 없으면 이 안으로 정리해볼게요. 꼭 조정이 필요한 분은 오늘 밤까지 알려주세요.</p></div><span class='chip'>부드럽게</span><span class='chip'>깔끔하게</span><span class='chip'>공지형</span><p class='p'>개인 이름과 불가 사유는 포함하지 않았습니다.</p><div class='btn'>문구 복사</div></section></main></body></html>
